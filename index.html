<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unified Tracker - Spaced Repetition & Reality Tracking</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Scientific spaced repetition and reality tracking app for BUET students">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Unified Tracker">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/TYHBdFH8/Gemini-Generated-Image-hf8x9dhf8x9dhf8x.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- CDN Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Global Styles */
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Hind Siliguri', sans-serif; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Enhanced Global Tab Navigation with Glassmorphism - Task 2.3 */
        .global-tab-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(30, 41, 59, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* Browser Fallback for Global Navigation */
        @supports not (backdrop-filter: blur(16px)) {
            .global-tab-nav {
                background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
        
        .global-tab-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
        }
        
        /* Enhanced Global Tab Buttons with Glassmorphism - Task 2.3 */
        .global-tab-btn {
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .global-tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        .global-tab-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 8px 24px rgba(99, 102, 241, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .module-container {
            display: none;
            padding-top: 80px;
        }
        
        .module-container.active {
            display: block;
        }
        
        /* Spaced Repetition Module Styles */
        .sr-module {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            letter-spacing: -0.01em;
            min-height: 100vh;
            position: relative;
        }
        
        .sr-module::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
            animation: bgShift 15s ease infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        .sr-module .font-bn { font-family: 'Hind Siliguri', sans-serif; }
        .sr-module .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .sr-module > * {
            position: relative;
            z-index: 1;
        }
        
        .sr-module .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .sr-module .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .sr-module .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        /* Enhanced Glassmorphism Card System - Task 2.1 */
        .sr-module .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sr-module .glass-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        /* Browser Fallback for Unsupported backdrop-filter - Task 2.2 */
        @supports not (backdrop-filter: blur(16px)) {
            .sr-module .glass-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
        
        /* Safari-specific fallback */
        @supports not (-webkit-backdrop-filter: blur(16px)) {
            .sr-module .glass-card {
                background: rgba(255, 255, 255, 0.95);
            }
        }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .sr-module .animate-due-warning { 
            border: 2px solid #fb7185 !important;
            animation: pulse-border 2s infinite;
        }
        
        .sr-module .tab-active { 
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white; 
            box-shadow: 0 8px 20px -4px rgba(79, 70, 229, 0.4); 
        }
        
        .sr-module .progress-bar-bg { background: #f1f5f9; border-radius: 999px; height: 6px; overflow: hidden; }
        .sr-module .progress-bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        /* Enhanced Sidebar Items with Glassmorphism - Task 2.3 */
        .sr-module .sidebar-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .sr-module .sidebar-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .sr-module .sidebar-item:hover::before {
            opacity: 1;
        }
        
        .sr-module .sidebar-item:hover:not(.tab-active) { 
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transform: translateX(4px);
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        /* Enhanced Modal Dialog with Glassmorphism - Task 2.3 */
        .sr-module #modal {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        .sr-module #modal > div {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        
        /* Browser Fallback for Modal */
        @supports not (backdrop-filter: blur(16px)) {
            .sr-module #modal {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            
            .sr-module #modal > div {
                background: rgba(255, 255, 255, 1) !important;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
        
        .sr-module .log-entry-added { border-left: 5px solid #0ea5e9; }
        .sr-module .log-entry-revised { border-left: 5px solid #84cc16; }
        .sr-module .log-entry-deleted { border-left: 5px solid #f43f5e; }
        
        .sr-module .chart-container { position: relative; height: 300px; width: 100%; }
        
        .sr-module .chart-container-scrollable { 
            position: relative; 
            height: 300px; 
            min-width: 600px;
        }
        
        .sr-module .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Reality Tracking Module Styles */
        .rt-module {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
            position: relative;
        }
        
        .rt-module::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            animation: bgShift 15s ease infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes float-rtl {
            0% { transform: translateX(110vw); }
            100% { transform: translateX(-150vw); }
        }
        
        .rt-module .animate-float-rtl {
            animation: float-rtl linear infinite;
        }
        
        /* Enhanced Glassmorphism for Reality Tracking Module - Task 2.3 */
        .rt-module .glass {
            background: rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .rt-module .glass:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        /* Browser Fallback for Reality Tracking - Task 2.2 */
        @supports not (backdrop-filter: blur(16px)) {
            .rt-module .glass {
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
        }
        
        .rt-module .neo-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .rt-module .neo-button:active {
            transform: scale(0.95);
        }
        
        .rt-module .glow-text {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5), 0 0 20px rgba(239, 68, 68, 0.2);
        }
        
        .rt-module ::-webkit-scrollbar { width: 4px; }
        .rt-module ::-webkit-scrollbar-track { background: #020617; }
        .rt-module ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .rt-module input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        
        .rt-module .graph-bar {
            transition: height 1s ease-out;
        }
        
        .rt-module .calendar-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        /* ===== TASK 3: NEUMORPHIC BUTTON SYSTEM ===== */
        
        /* Task 3.1: Neumorphic Button Base Styles */
        .neu-button {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 16px;
            box-shadow: 
                8px 8px 16px rgba(0, 0, 0, 0.4),
                -8px -8px 16px rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .neu-button:hover {
            box-shadow: 
                12px 12px 24px rgba(0, 0, 0, 0.5),
                -12px -12px 24px rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        
        .neu-button:active {
            box-shadow: 
                inset 4px 4px 8px rgba(0, 0, 0, 0.5),
                inset -4px -4px 8px rgba(255, 255, 255, 0.05);
            transform: scale(0.98);
        }
        
        /* Task 3.2: Button Variants and Sizes */
        .neu-button-primary {
            background: linear-gradient(145deg, #6366f1, #4f46e5);
            box-shadow: 
                8px 8px 16px rgba(79, 70, 229, 0.3),
                -8px -8px 16px rgba(99, 102, 241, 0.1);
        }
        
        .neu-button-primary:hover {
            box-shadow: 
                12px 12px 24px rgba(79, 70, 229, 0.4),
                -12px -12px 24px rgba(99, 102, 241, 0.15);
        }
        
        .neu-button-secondary {
            background: linear-gradient(145deg, #64748b, #475569);
            box-shadow: 
                8px 8px 16px rgba(71, 85, 105, 0.3),
                -8px -8px 16px rgba(100, 116, 139, 0.1);
        }
        
        .neu-button-danger {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            box-shadow: 
                8px 8px 16px rgba(220, 38, 38, 0.3),
                -8px -8px 16px rgba(239, 68, 68, 0.1);
        }
        
        .neu-button-small {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            border-radius: 12px;
        }
        
        .neu-button-medium {
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            border-radius: 14px;
        }
        
        .neu-button-large {
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 18px;
        }
        
        .neu-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.2),
                -4px -4px 8px rgba(255, 255, 255, 0.02);
        }
        
        .neu-button:disabled:hover {
            transform: none;
        }
        
        /* Focus indicators for accessibility - Task 3.2 */
        .neu-button:focus {
            outline: none;
            box-shadow: 
                8px 8px 16px rgba(0, 0, 0, 0.4),
                -8px -8px 16px rgba(255, 255, 255, 0.05),
                0 0 0 3px rgba(99, 102, 241, 0.5);
        }
        
        .neu-button:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }
        
        /* ===== TASK 5: ADVANCED GRADIENT SYSTEM ===== */
        
        /* Task 5.1: Animated Gradient Backgrounds */
        .gradient-primary {
            background: linear-gradient(
                135deg,
                hsl(239, 84%, 67%) 0%,
                hsl(280, 84%, 67%) 50%,
                hsl(320, 84%, 67%) 100%
            );
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .gradient-secondary {
            background: linear-gradient(
                135deg,
                hsl(200, 84%, 67%) 0%,
                hsl(240, 84%, 67%) 50%,
                hsl(280, 84%, 67%) 100%
            );
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        .gradient-accent {
            background: linear-gradient(
                135deg,
                hsl(320, 84%, 67%) 0%,
                hsl(360, 84%, 67%) 50%,
                hsl(40, 84%, 67%) 100%
            );
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        /* Task 5.2: Interactive Gradient Overlays */
        .gradient-overlay {
            position: relative;
            overflow: hidden;
        }
        
        .gradient-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(99, 102, 241, 0.3) 0%,
                transparent 50%
            );
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 1;
        }
        
        .gradient-overlay:hover::before {
            opacity: 1;
        }
        
        .gradient-overlay > * {
            position: relative;
            z-index: 2;
        }
        
        /* ===== TASK 6: PARTICLE EFFECT SYSTEM ===== */
        
        /* Task 6.1: Particle Container and Base Styles */
        .particle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.8), transparent);
            border-radius: 50%;
            animation: float var(--duration, 20s) linear infinite;
            opacity: 0;
            will-change: transform, opacity;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(var(--drift, 50px)) scale(1);
                opacity: 0;
            }
        }
        
        /* Respect reduced motion preference - Task 6.3 */
        @media (prefers-reduced-motion: reduce) {
            .particle {
                animation: none;
                display: none;
            }
        }
        
        /* ===== TASK 8: 3D TRANSFORM SYSTEM ===== */
        
        /* Task 8.1: 3D Transform Base Styles */
        .transform-3d-container {
            perspective: 1000px;
            perspective-origin: center;
        }
        
        .transform-3d-card {
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .transform-3d-card:hover {
            transform: 
                rotateX(var(--rotate-x, 0deg))
                rotateY(var(--rotate-y, 0deg))
                translateZ(20px);
        }
        
        /* Shine effect - Task 8.1 */
        .transform-3d-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.2) 0%,
                transparent 50%
            );
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 10;
        }
        
        .transform-3d-card:hover::after {
            opacity: 1;
        }
        
        /* Disable 3D on mobile for performance */
        @media (max-width: 768px) {
            .transform-3d-card {
                transform-style: flat;
            }
            
            .transform-3d-card:hover {
                transform: translateY(-4px) scale(1.02);
            }
        }
        
        /* ===== TASK 9: MICRO-INTERACTION SYSTEM ===== */
        
        /* Task 9.1: Ripple Effect Animation */
        .micro-ripple {
            position: relative;
            overflow: hidden;
        }
        
        .micro-ripple::after {
            content: '';
            position: absolute;
            top: var(--ripple-y, 50%);
            left: var(--ripple-x, 50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            animation: ripple 600ms ease-out;
            pointer-events: none;
        }
        
        @keyframes ripple {
            to {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }
        
        /* Task 9.2: Bounce and Shake Animations */
        .micro-bounce {
            animation: bounce 400ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .micro-shake {
            animation: shake 400ms ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        .micro-glow {
            animation: glow 1s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            }
            to {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.8), 0 0 30px rgba(99, 102, 241, 0.6);
            }
        }
        
        /* Pulse animation for notifications */
        .micro-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        /* ===== TASK 11: RESPONSIVE LAYOUT SYSTEM ===== */
        
        /* Task 11.1: Responsive Grid System */
        .responsive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
            gap: clamp(1rem, 3vw, 2rem);
            padding: clamp(1rem, 4vw, 3rem);
        }
        
        .responsive-stack {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

    <!-- Spaced Repetition JavaScript -->
     
    <script>

        
    const firebaseConfig = {
        apiKey: "AIzaSyBtSqPxbB_-tuOWbor-ipHPrtx4gA3yNGA",
        authDomain: "buet-tracker.firebaseapp.com",
        projectId: "buet-tracker",
        storageBucket: "buet-tracker.firebasestorage.app",
        messagingSenderId: "296969097637",
        appId: "1:296969097637:web:3d77b2818501f2951c184c",
        measurementId: "G-0CS4ZWD0BH",
        databaseURL: "https://buet-tracker-default-rtdb.firebaseio.com/"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const database = firebase.database();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // PWA and Offline Functionality
    let isOnline = navigator.onLine;
    let offlineQueue = [];
    let db = null;

    // Initialize IndexedDB for offline storage
    function initOfflineDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('UnifiedTrackerOffline', 1);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = () => {
                const database = request.result;
                
                // Create offline queue store
                if (!database.objectStoreNames.contains('offlineQueue')) {
                    const store = database.createObjectStore('offlineQueue', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('timestamp', 'timestamp', { unique: false });
                    store.createIndex('type', 'type', { unique: false });
                }
                
                // Create offline topics store
                if (!database.objectStoreNames.contains('offlineTopics')) {
                    const topicsStore = database.createObjectStore('offlineTopics', { keyPath: 'id' });
                    topicsStore.createIndex('createdAt', 'createdAt', { unique: false });
                }
                
                // Create offline logs store
                if (!database.objectStoreNames.contains('offlineLogs')) {
                    const logsStore = database.createObjectStore('offlineLogs', { keyPath: 'id', autoIncrement: true });
                    logsStore.createIndex('timestamp', 'timestamp', { unique: false });
                }
            };
        });
    }

    // Save data to offline queue
    function saveToOfflineQueue(action, data) {
        if (!db) return;
        
        const transaction = db.transaction(['offlineQueue'], 'readwrite');
        const store = transaction.objectStore('offlineQueue');
        
        const queueItem = {
            action: action,
            data: data,
            timestamp: Date.now(),
            synced: false
        };
        
        store.add(queueItem);
        console.log('Saved to offline queue:', action, data);
    }

    // Save topics offline
    function saveTopicsOffline(topicsData) {
        if (!db) return;
        
        const transaction = db.transaction(['offlineTopics'], 'readwrite');
        const store = transaction.objectStore('offlineTopics');
        
        topicsData.forEach(topic => {
            store.put(topic);
        });
    }

    // Load topics from offline storage
    function loadTopicsOffline() {
        return new Promise((resolve, reject) => {
            if (!db) {
                resolve([]);
                return;
            }
            
            const transaction = db.transaction(['offlineTopics'], 'readonly');
            const store = transaction.objectStore('offlineTopics');
            const request = store.getAll();
            
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    // Sync offline data when online
    async function syncOfflineData() {
        if (!db || !currentUser || !isOnline) return;
        
        const transaction = db.transaction(['offlineQueue'], 'readwrite');
        const store = transaction.objectStore('offlineQueue');
        const request = store.getAll();
        
        request.onsuccess = async () => {
            const queueItems = request.result.filter(item => !item.synced);
            
            // Track ID mappings: offline_id -> firebase_id
            const idMappings = new Map();
            
            // Track items to skip (deleted before sync)
            const deletedOfflineIds = new Set();
            
            // First pass: identify deletions of offline items
            for (const item of queueItems) {
                if (item.action === 'deleteTopic' && item.data.id && item.data.id.startsWith('offline_')) {
                    deletedOfflineIds.add(item.data.id);
                }
            }
            
            for (const item of queueItems) {
                try {
                    switch (item.action) {
                        case 'addTopic':
                            // Skip if this offline item was deleted before sync
                            if (item.data.id && item.data.id.startsWith('offline_') && deletedOfflineIds.has(item.data.id)) {
                                console.log('Skipping add for deleted offline item:', item.data.id);
                                // Mark as synced to remove from queue
                                const updateTransaction = db.transaction(['offlineQueue'], 'readwrite');
                                const updateStore = updateTransaction.objectStore('offlineQueue');
                                item.synced = true;
                                updateStore.put(item);
                                continue;
                            }
                            
                            // Add to Firebase and track ID mapping
                            const offlineId = item.data.id;
                            const topicData = { ...item.data };
                            delete topicData.id; // Remove offline ID before pushing to Firebase
                            
                            const newRef = await database.ref(`users/${currentUser.uid}/spacedRepetition/topics`).push();
                            await newRef.set(topicData);
                            
                            // Track mapping if this was an offline ID
                            if (offlineId && offlineId.startsWith('offline_')) {
                                idMappings.set(offlineId, newRef.key);
                                console.log('ID mapping:', offlineId, '->', newRef.key);
                                
                                // Update local topics array with new Firebase ID
                                const topicIndex = topics.findIndex(t => t.id === offlineId);
                                if (topicIndex !== -1) {
                                    topics[topicIndex].id = newRef.key;
                                    console.log('Updated local topic ID:', offlineId, '->', newRef.key);
                                }
                                
                                // Remove from offlineTopics store and add to regular topics
                                if (db) {
                                    const offlineTransaction = db.transaction(['offlineTopics'], 'readwrite');
                                    const offlineStore = offlineTransaction.objectStore('offlineTopics');
                                    offlineStore.delete(offlineId);
                                }
                            }
                            break;
                            
                        case 'updateTopic':
                            // Check if we need to use mapped ID
                            let updateId = item.data.id;
                            if (updateId && updateId.startsWith('offline_') && idMappings.has(updateId)) {
                                updateId = idMappings.get(updateId);
                            }
                            await database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${updateId}`).update(item.data.updates);
                            break;
                            
                        case 'deleteTopic':
                            // Check if this is an offline-created item
                            let deleteId = item.data.id;
                            if (deleteId && deleteId.startsWith('offline_')) {
                                // Check if we have a Firebase ID mapping
                                if (idMappings.has(deleteId)) {
                                    deleteId = idMappings.get(deleteId);
                                    await database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${deleteId}`).remove();
                                    console.log('Deleted synced offline item from Firebase:', deleteId);
                                } else {
                                    // Item was deleted before being synced to Firebase, already handled in addTopic
                                    console.log('Offline item deleted before sync, no Firebase action needed:', deleteId);
                                }
                            } else {
                                // Normal Firebase item deletion

        // ===== TASK 6.2 & 6.3: PARTICLE GENERATION SYSTEM =====
        let particleAnimationFrameId = null;

        function generateParticles(container, count) {
            if (!container) return [];
            
            // Respect reduced motion preference
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                return [];
            }
            
            // Limit particle count based on device
            const isMobile = window.innerWidth < 768;
            const maxCount = isMobile ? 50 : 100;
            const actualCount = Math.min(count, maxCount);
            
            const particles = [];
            
            for (let i = 0; i < actualCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Randomize particle properties
                const size = 2 + Math.random() * 4; // 2-6px
                const duration = 15 + Math.random() * 15; // 15-30s
                const delay = Math.random() * 10; // 0-10s
                const drift = -100 + Math.random() * 200; // -100 to 100px
                const startX = Math.random() * container.offsetWidth;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = startX + 'px';
                particle.style.setProperty('--duration', duration + 's');
                particle.style.setProperty('--drift', drift + 'px');
                particle.style.animationDelay = delay + 's';
                
                container.appendChild(particle);
                particles.push(particle);
            }
            
            return particles;
        }
        
        // Performance monitoring for particles
        function monitorParticlePerformance() {
            const currentTime = performance.now();
            const deltaTime = currentTime - lastFrameTime;
            lastFrameTime = currentTime;
            
            fps = 1000 / deltaTime;
            
            // If FPS drops below 30, reduce particles
            if (fps < 30) {
                const containers = document.querySelectorAll('.particle-container');
                containers.forEach(container => {
                    const particles = container.querySelectorAll('.particle');
                    const removeCount = Math.floor(particles.length * 0.25);
                    for (let i = 0; i < removeCount; i++) {
                        if (particles[i]) particles[i].remove();
                    }
                });
            }
            
            particleAnimationFrameId = requestAnimationFrame(monitorParticlePerformance);

        document.addEventListener('visibilitychange', () => {

        // ===== TASK 8.2 & 8.3: 3D TRANSFORM CALCULATION =====
        function calculate3DTransform(element, mouseX, mouseY) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + (rect.width / 2);
            const centerY = rect.top + (rect.height / 2);
            
            // Calculate relative position (-1 to 1)
            let relativeX = (mouseX - centerX) / (rect.width / 2);
            let relativeY = (mouseY - centerY) / (rect.height / 2);
            
            // Clamp values
            relativeX = Math.max(-1, Math.min(1, relativeX));
            relativeY = Math.max(-1, Math.min(1, relativeY));
            
            // Calculate rotation angles (max 15 degrees)
            const rotateY = relativeX * 15;
            const rotateX = relativeY * -15;
            
            return {
                rotateX: rotateX,
                rotateY: rotateY,
                transform: `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(20px)`
            };
        }
        
        // Setup 3D transform on elements
        function setup3DTransforms() {
            const cards3D = document.querySelectorAll('.transform-3d-card');
            
            cards3D.forEach(card => {
                let throttleTimeout = null;
                
                card.addEventListener('mousemove', (e) => {
                    if (throttleTimeout) return;
                    
                    throttleTimeout = setTimeout(() => {
                        const transform = calculate3DTransform(card, e.clientX, e.clientY);
                        card.style.setProperty('--rotate-x', transform.rotateX + 'deg');
                        card.style.setProperty('--rotate-y', transform.rotateY + 'deg');
                        throttleTimeout = null;
                    }, 16); // 60fps throttle
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.setProperty('--rotate-x', '0deg');
                    card.style.setProperty('--rotate-y', '0deg');
                });
            });
        }
        
        // ===== TASK 5.2: GRADIENT OVERLAY MOUSE TRACKING =====
        function setupGradientOverlays() {
            const overlays = document.querySelectorAll('.gradient-overlay');
            
            overlays.forEach(overlay => {
                overlay.addEventListener('mousemove', (e) => {
                    const rect = overlay.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    
                    overlay.style.setProperty('--mouse-x', x + '%');
                    overlay.style.setProperty('--mouse-y', y + '%');
                });
            });
        }
        
        // ===== TASK 9.3: MICRO-INTERACTION SETUP =====
        function setupMicroInteraction(element, type) {
            if (type === 'ripple') {
                element.classList.add('micro-ripple');
                
                element.addEventListener('click', (e) => {
                    const rect = element.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    element.style.setProperty('--ripple-x', x + 'px');
                    element.style.setProperty('--ripple-y', y + 'px');
                    
                    // Trigger animation by removing and re-adding class
                    element.classList.remove('micro-ripple');
                    void element.offsetWidth; // Force reflow
                    element.classList.add('micro-ripple');
                });
            } else if (type === 'bounce') {
                element.addEventListener('click', () => {
                    element.classList.add('micro-bounce');
                    setTimeout(() => element.classList.remove('micro-bounce'), 400);
                });
            } else if (type === 'shake') {
                element.addEventListener('click', () => {
                    element.classList.add('micro-shake');
                    setTimeout(() => element.classList.remove('micro-shake'), 400);
                });
            } else if (type === 'glow') {
                element.classList.add('micro-glow');
            }
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        function throttle(func, limit) {
            let inThrottle;
            return function(...args) {
                if (!inThrottle) {
                    func.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        }

        function calculateMetrics(topic) {
            const now = Date.now();
            const elapsedMs = now - topic.startTime;
            const elapsedHours = elapsedMs / 3600000;
            const gapIndex = Math.min(topic.revCount, SCIENTIFIC_GAPS.length - 1);
            const currentGapDays = SCIENTIFIC_GAPS[gapIndex] || (topic.revCount * 30);
            const nextGapDays = SCIENTIFIC_GAPS[gapIndex + 1] || (currentGapDays + 30);
            const totalCycleMs = nextGapDays * 86400000;
            const remainingMs = topic.nextDate - now;

            const baseRetention = 80 + (topic.revCount * 4);
            const stabilityFactor = Math.max(24, currentGapDays * 24 * (1 + topic.revCount * 0.5));
            const currentRetention = baseRetention * Math.exp(-elapsedHours / stabilityFactor);
            const brainSave = Math.max(5, Math.min(100, Math.round(currentRetention)));

            // Fixed battery calculation - should be based on time until next review
            let battery = 100;
            if (remainingMs <= 0) {
                // Overdue - battery should be 0
                battery = 0;
            } else {
                // Calculate battery based on remaining time vs total interval
                const totalIntervalMs = currentGapDays * 86400000;
                battery = Math.round((remainingMs / totalIntervalMs) * 100);
                battery = Math.max(0, Math.min(100, battery));
            }

            // Color coding based on battery level
            let color = 'bg-emerald-500';
            let textColor = 'text-emerald-600';
            if (battery <= 0) { 
                color = 'bg-rose-500'; 
                textColor = 'text-rose-600'; 
            } else if (battery < 25) { 
                color = 'bg-red-500'; 
                textColor = 'text-red-600'; 
            } else if (battery < 50) { 
                color = 'bg-orange-500'; 
                textColor = 'text-orange-600'; 
            } else if (battery < 75) { 
                color = 'bg-yellow-500'; 
                textColor = 'text-yellow-600'; 
            }

            let timerStr = "এখনই রিভাইজ দিন";
            if (remainingMs > 0) {
                const h = Math.floor(remainingMs / 3600000);
                const m = Math.floor((remainingMs % 3600000) / 60000);
                timerStr = `${h}ঘণ্টা ${m}মিনিট পর`;
            }

            return {
                battery, color, textColor, brainSave, isDue: now >= topic.nextDate,
                timerStr,
                addedStr: new Date(topic.createdAt).toLocaleDateString('bn-BD'),
                nextDateStr: new Date(topic.nextDate).toLocaleDateString('bn-BD', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                })
            };
        }

function addLogOffline(topicName, action, type) {
    const logData = {
        id: 'offline_' + Date.now(),
        topicName, action, type,
        time: new Date().toLocaleString('bn-BD', { hour12: true }),
        timestamp: Date.now()
    };
    
    // Add to local logs array
    logs.unshift(logData);
    if (logs.length > 200) logs.pop();
    
    // Save to IndexedDB
    if (db) {
        const transaction = db.transaction(['offlineLogs'], 'readwrite');
        const store = transaction.objectStore('offlineLogs');
        store.add(logData);
    }
    
    // Save to offline queue for sync
    saveToOfflineQueue('addLog', {
        topicName, action, type,
        time: logData.time,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    });
}

        addTopicOffline(topicData);
        saveToOfflineQueue('addTopic', topicData);
        showNotification('অফলাইন মোড', 'টপিক অফলাইনে সেভ হয়েছে। অনলাইন হলে সিঙ্ক হবে।');
    }
}

function addTopicOffline(topicData) {
    // Add to local topics array
    topics.unshift(topicData);
    
    // Save to IndexedDB
    if (db) {
        const transaction = db.transaction(['offlineTopics'], 'readwrite');
        const store = transaction.objectStore('offlineTopics');
        store.put(topicData);
    }
    
    // Update UI
    render();
    updateSidebarStats();
}
function handleReview(id) {
    const topic = topics.find(t => t.id === id);
    if (!topic) return;

    const now = Date.now();
    const newRevCount = topic.revCount + 1;
    const days = SCIENTIFIC_GAPS[Math.min(newRevCount, SCIENTIFIC_GAPS.length - 1)];
    
    const updates = {
        revCount: newRevCount,
        startTime: now,
        nextDate: now + (days * 86400000)
    };

    if (currentUser && isOnline) {
        // Online: Update Firebase
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${id}`).update(updates)
            .then(() => addLog(topic.name, "রিভিশন সম্পন্ন হয়েছে", "revised"))
            .catch((error) => {
                console.error("Error:", error);
                // If Firebase fails, save offline
                saveToOfflineQueue('updateTopic', { id: id, updates: updates });
                updateTopicOffline(id, updates);
            });
    } else {
        // Offline: Update locally
        updateTopicOffline(id, updates);
        saveToOfflineQueue('updateTopic', { id: id, updates: updates });
        addLogOffline(topic.name, "রিভিশন সম্পন্ন হয়েছে", "revised");
        showNotification('অফলাইন রিভিউ', 'রিভিশন অফলাইনে সেভ হয়েছে');
    }
}

function updateTopicOffline(id, updates) {
    // Update local topics array
    const topicIndex = topics.findIndex(t => t.id === id);
    if (topicIndex !== -1) {
        Object.assign(topics[topicIndex], updates);
        
        // Save to IndexedDB
        if (db) {
            const transaction = db.transaction(['offlineTopics'], 'readwrite');
            const store = transaction.objectStore('offlineTopics');
            store.put(topics[topicIndex]);
        }
        
        // Update UI
        render();
        updateSidebarStats();
    }
}

      function deleteTopic(id) {
    if (!currentUser) return;
    const topic = topics.find(t => t.id === id);
    if (!topic || !confirm(`"${topic.name}" মুছে ফেলতে চান?`)) return;

    if (isOnline) {
        // Online: Delete from Firebase directly
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${id}`).remove()
            .then(() => {
                addLog(topic.name, "রেকর্ড মুছে ফেলা হয়েছে", "deleted");
                // Remove from local array immediately for better UX
                topics = topics.filter(t => t.id !== id);
                render();
                updateSidebarStats();
            })
            .catch((error) => {
                console.error('Failed to delete topic:', error);
                showNotification('ত্রুটি', 'টপিক মুছতে ব্যর্থ হয়েছে');
            });
    } else {
        // Offline: Queue for later sync
        if (db) {
            const transaction = db.transaction(['offlineQueue'], 'readwrite');
            const store = transaction.objectStore('offlineQueue');
            store.add({
                action: 'deleteTopic',
                data: { id: id },
                timestamp: Date.now(),
                synced: false
            });
        }
        
        // Remove from local array
        topics = topics.filter(t => t.id !== id);
        
        // Remove from IndexedDB if it's an offline topic
        if (id.startsWith('offline_') && db) {
            const transaction = db.transaction(['offlineTopics'], 'readwrite');
            const store = transaction.objectStore('offlineTopics');
            store.delete(id);
        }
        
        addLog(topic.name, "রেকর্ড মুছে ফেলা হয়েছে (অফলাইন)", "deleted");
        render();
        updateSidebarStats();
    }
}

        const FloatingNote = ({ text, index }) => {
            const noteRef = useRef(null);

            useEffect(() => {
                const element = noteRef.current;
                if (!element) return;

                let currentLane = -1;
                let isNoteActive = false;

                const startFloating = () => {
                    if (activeNotesCount >= 6) {
                        setTimeout(startFloating, 2000 + Math.random() * 3000);
                        return;
                    }

                    const availableLanes = occupiedLanes
                        .map((occ, i) => occ ? null : i)
                        .filter(i => i !== null);
                    
                    if (availableLanes.length === 0) {
                        setTimeout(startFloating, 1000);
                        return;
                    }

                    const randomIdx = Math.floor(Math.random() * availableLanes.length);
                    currentLane = availableLanes[randomIdx];
                    occupiedLanes[currentLane] = true;
                    activeNotesCount++;
                    isNoteActive = true;

                    const topPos = 12 + (currentLane * 7); 
                    element.style.top = `${topPos}%`;
                    element.style.visibility = 'visible';

                    const duration = Math.floor(Math.random() * 40000) + 60000;

                    const animation = element.animate([
                        { transform: 'translateX(120vw)' },
                        { transform: 'translateX(-180vw)' }
                    ], {
                        duration: duration,
                        easing: 'linear',
                        delay: 0 
                    });

                    animation.onfinish = () => {
                        if (currentLane !== -1) occupiedLanes[currentLane] = false;
                        if (isNoteActive) {
                            activeNotesCount--;
                            isNoteActive = false;
                        }
                        element.style.visibility = 'hidden';
                        setTimeout(startFloating, 1000 + Math.random() * 5000);
                    };
                };

                element.style.visibility = 'hidden';
                const initialStartTimeout = setTimeout(startFloating, index * 3000);

                return () => {
                    clearTimeout(initialStartTimeout);
                    if (currentLane !== -1) occupiedLanes[currentLane] = false;
                    if (isNoteActive) activeNotesCount--;
                    if (element) {
                        element.getAnimations().forEach(anim => anim.cancel());
                    }
                };
            }, [index]);

            return (
                <div 
                    ref={noteRef}
                    className="fixed z-[9999] whitespace-nowrap pointer-events-none text-red-500/90 font-black italic select-none glow-text"
                    style={{ left: 0, willChange: 'transform', visibility: 'hidden' }}
                >
                    * {text}
                </div>
            );
        };

            return (
                <div className="min-h-screen pb-20 px-4 pt-6 md:pt-10 max-w-2xl mx-auto relative">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-[9999]">
                        {notes.map((n, i) => <FloatingNote key={n.id} text={n.text} index={i} />)}
                    </div>

                    <div className="sticky top-4 z-[50] mb-8">
                        <div className="glass rounded-2xl p-4 shadow-2xl border-white/20">
                            <div className="flex justify-between text-[10px] font-black italic mb-2 tracking-widest">
                                <span className={progressValue < 0 ? "text-red-500" : "text-slate-500"}>LOSER</span>
                                <span className={progressValue > 0 ? "text-blue-400" : "text-slate-500"}>BUETIAN</span>
                            </div>
                            <div className="h-4 bg-slate-900/80 rounded-full overflow-hidden flex relative border border-white/5">
                                <div className="absolute inset-0 flex justify-center"><div className="w-0.5 h-full bg-white/40 z-10" /></div>
                                <div className="flex-1 flex justify-end">
                                    <div className="h-full bg-gradient-to-l from-red-600 to-red-900 transition-all duration-700 ease-out" style={{ width: progressValue < 0 ? `${Math.abs(progressValue)}%` : '0%' }} />
                                </div>
                                <div className="flex-1 flex justify-start">
                                    <div className="h-full bg-gradient-to-r from-blue-600 to-blue-900 transition-all duration-700 ease-out" style={{ width: progressValue > 0 ? `${progressValue}%` : '0%' }} />
                                </div>
                            </div>
                        </div>
                    </div>

                    <header className="text-center mb-8 space-y-4">
                        <div className="flex justify-between items-center mb-4">
                           <button onClick={() => setShowSettings(true)} className="p-2 glass rounded-full text-slate-400"><Icon name="settings" size={18} /></button>
                           <button onClick={handleLogout} className="text-[10px] font-bold text-red-500 uppercase tracking-widest">Logout</button>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-black italic tracking-tighter uppercase">এটাই <span className="text-blue-500">  বাস্তবতা</span></h1>
                        <div className="mb-2 h-8 flex items-center justify-center overflow-hidden">
                            <div className={`transition-all duration-1000 transform ${showMeaning ? '-translate-y-full opacity-0' : 'translate-y-0 opacity-100'}`}>
                                {!showMeaning && (
                                    <h2 className="text-lg font-bold text-blue-400 tracking-widest uppercase">
                                        MD Faizur Rahman Labib
                                    </h2>
                                )}
                            </div>
                            <div className={`absolute transition-all duration-1000 transform ${showMeaning ? 'translate-y-0 opacity-100' : 'translate-y-full opacity-0'}`}>
                                {showMeaning && (
                                    <h2 className="text-lg font-medium text-slate-300 italic">
                                        "পরম দয়ালু আল্লাহর অনুগ্রহপ্রাপ্ত প্রখর মেধার অধিকারী ও অত্যন্ত বুদ্ধিমান ব্যক্তি যিনি সুদূরপ্রসারী চিন্তার অধিকারী"
                                    </h2>
                                )}
                            </div>
                        </div>
                        <div className="glass px-4 py-2 rounded-xl inline-flex items-center gap-2 max-w-[90%] mx-auto">
                            <Icon name="quote" size={14} className="text-blue-500 shrink-0" />
                            <p className="text-slate-400 italic text-xs md:text-sm truncate">{quote}</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 gap-3 mb-8">
                        <div className="glass p-4 rounded-2xl text-center border-l-4 border-l-blue-500">
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">HSC 2026</p>
                            <p className="text-lg md:text-xl font-mono font-black">{timeLeft.hsc.d}d <span className="text-blue-500">{timeLeft.hsc.h}h</span></p>
                        </div>
                        <div className="glass p-4 rounded-2xl text-center border-l-4 border-l-purple-500">
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">BUET ADMISSION</p>
                            <p className="text-lg md:text-xl font-mono font-black">{timeLeft.buet.d}d <span className="text-purple-500">{timeLeft.buet.h}h</span></p>
                        </div>
                    </div>

                    <main className="glass border-2 border-slate-800/50 p-6 md:p-10 rounded-[2.5rem] text-center mb-8 relative overflow-hidden">
                        <div className="absolute top-4 right-6 flex gap-3">
                            <button onClick={() => setShowNoteModal(true)} className="p-2 text-slate-400 hover:text-blue-400"><Icon name="sticky-note" /></button>
                            <button onClick={() => setShowCalendar(true)} className="p-2 text-slate-400 hover:text-blue-400"><Icon name="calendar-days" /></button>
                        </div>
                        <div className="space-y-6 pt-4">
                            <h2 className="text-xl md:text-3xl font-black italic leading-tight">আজকে কি তুই নিজের <br/><span className="text-blue-500 underline decoration-2 underline-offset-4">সর্বোচ্চটা</span> দিসোস?</h2>
                            {todayStatus ? (
                                <div className="py-4 animate-in fade-in zoom-in duration-500 space-y-6">
                                    <div className={`inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-xl font-black ${todayStatus === 'yes' ? 'bg-green-600' : 'bg-red-600'}`}>
                                        <Icon name={todayStatus === 'yes' ? 'check-circle' : 'x-circle'} />
                                        {todayStatus === 'yes' ? 'হ্যাঁ, দিয়েছি!' : 'না, আমি অলস।'}
                                    </div>
                                    <div className="bg-white/5 border border-white/10 rounded-2xl p-4 mt-4 italic text-blue-400 text-sm md:text-base">"{randomAyat}"</div>
                                </div>
                            ) : (
                                <div className="flex justify-center gap-4">
                                    <button onClick={() => handleChoice('yes')} className="neo-button flex-1 max-w-[140px] py-5 bg-blue-600 rounded-2xl text-2xl font-black italic">হ্যাঁ</button>
                                    <button onClick={() => handleChoice('no')} className="neo-button flex-1 max-w-[140px] py-5 glass rounded-2xl text-2xl font-black italic">না</button>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="glass p-6 rounded-3xl mb-8">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-6 flex items-center gap-2">
                            <Icon name="bar-chart-3" size={12} /> Last 7 Days Performance
                        </h3>
                        <div className="flex justify-between items-end h-24 px-2">
                            {last7DaysGraph.map((day, i) => (
                                <div key={i} className="flex flex-col items-center gap-2 flex-1">
                                    <div className={`w-full max-w-[10px] rounded-full graph-bar ${
                                        day.status === 'yes' ? 'bg-blue-500 h-20 shadow-[0_0_15px_rgba(59,130,246,0.5)]' : 
                                        day.status === 'no' ? 'bg-red-500 h-10 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'bg-slate-800 h-2'
                                    }`} />
                                    <span className="text-[8px] font-bold text-slate-500 uppercase">{day.label}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-4 gap-2 mb-8">
                        {[
                            { label: 'Streak', val: streak, icon: 'flame', color: 'text-orange-500' },
                            { label: 'Success', val: yesTotal, icon: 'target', color: 'text-green-500' },
                            { label: 'Failure', val: noTotal, icon: 'info', color: 'text-red-500' },
                            { label: 'Ratio', val: (history.length ? Math.round((yesTotal/history.length)*100) : 0) + '%', icon: 'trending-up', color: 'text-blue-400' }
                        ].map((s, i) => (
                            <div key={i} className="glass p-3 rounded-xl text-center">
                                <Icon name={s.icon} size={16} className={`${s.color} mb-1`} />
                                <p className="text-[8px] font-black text-slate-500 uppercase">{s.label}</p>
                                <p className="text-sm font-black">{s.val}</p>
                            </div>
                        ))}
                    </div>

                    <div className="glass p-6 rounded-3xl mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 flex items-center gap-2"><Icon name="timer" size={12} /> Focus Timer</h3>
                            <button onClick={addCustomTimer} className="text-blue-500"><Icon name="plus-circle" size={18} /></button>
                        </div>
                        
                        {activeTimer && (
                            <div className={`border-2 rounded-2xl p-6 mb-4 text-center transition-all duration-300 ${isAlarmPlaying ? 'bg-red-600/40 border-red-500 animate-pulse' : 'bg-blue-600/20 border-blue-500/30'}`}>
                                <p className="text-xs font-bold text-blue-400 uppercase mb-1">{activeTimer.label}</p>
                                
                                {isAlarmPlaying ? (
                                    <div className="py-2">
                                        <p className="text-2xl font-black text-white glow-text mb-4 uppercase italic">Time's Up! Focus!</p>
                                        <button onClick={stopAlarm} className="bg-white text-red-600 px-8 py-3 rounded-xl font-black shadow-lg neo-button">
                                            STOP ALARM
                                        </button>
                                    </div>
                                ) : (
                                    <>
                                        <p className="text-5xl font-mono font-black mb-4">{formatTime(timerSeconds)}</p>
                                        <div className="flex justify-center gap-3">
                                            <button onClick={() => setIsTimerRunning(!isTimerRunning)} className="bg-blue-600 px-6 py-2 rounded-xl font-bold">
                                                {isTimerRunning ? 'Pause' : 'Resume'}
                                            </button>
                                            <button onClick={() => {setIsTimerRunning(false); setTimerSeconds(0); setActiveTimer(null);}} className="bg-slate-800 px-6 py-2 rounded-xl font-bold">Stop</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        <div className="flex gap-2 overflow-x-auto pb-2 scroll-hide">
                            {timers.map(t => (
                                <div key={t.id} className="relative group shrink-0">
                                    <button onClick={() => startTimer(t)} className="glass px-4 py-2 rounded-xl whitespace-nowrap text-xs font-bold hover:border-blue-500 transition-all flex items-center gap-2">
                                        {t.label} ({t.minutes}m)
                                        <div onClick={(e) => deleteTimer(e, t.id)} className="p-1 hover:text-red-500">
                                            <Icon name="trash-2" size={12} />
                                        </div>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-4">
                        <div className="flex justify-between items-center px-2">
                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 flex items-center gap-2"><Icon name="history" size={12} /> Recent History</h3>
                            <button onClick={() => setShowFullHistory(true)} className="text-[10px] font-bold text-blue-500 uppercase">View All</button>
                        </div>
                        <div className="glass rounded-2xl divide-y divide-slate-800/50 max-h-60 overflow-y-auto pr-1">
                            {history.length === 0 ? <p className="p-10 text-center text-slate-600 italic text-sm">কোনো রেকর্ড নেই</p> : history.slice(0, 7).map(item => (
                                <div key={item.id} className="flex items-center justify-between p-4 hover:bg-white/5 transition-colors">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-1.5 h-1.5 rounded-full ${item.status === 'yes' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]'}`} />
                                        <div>
                                            <p className="text-xs font-bold">{item.id.split('-').reverse().join('/')}</p>
                                            <p className="text-[9px] text-slate-500 uppercase">{new Date(item.id).toLocaleDateString('bn-BD', { weekday: 'long' })}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => database.ref(`users/${user.uid}/history/${item.id}`).remove()} className="text-slate-700 hover:text-red-500 transition-colors"><Icon name="trash-2" size={14}/></button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showFullHistory && (
                        <div className="fixed inset-0 z-[101] bg-black/90 backdrop-blur-lg flex items-center justify-center p-4">
                            <div className="glass w-full max-w-md rounded-[2.5rem] p-8 space-y-6 max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xl font-black italic text-blue-400 uppercase">Full History</h3>
                                    <button onClick={() => setShowFullHistory(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="grid grid-cols-7 gap-2 pb-6 border-b border-white/5">
                                    {history.map(item => (
                                        <div key={item.id} title={item.id} className="flex flex-col items-center gap-1">
                                            <div className={`calendar-dot ${item.status === 'yes' ? 'bg-green-500' : 'bg-red-500'}`} />
                                            <span className="text-[7px] text-slate-500">{item.id.split('-')[2]}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-2">
                                    {history.map(item => (
                                        <div key={item.id} className="flex justify-between text-[11px] text-slate-400 bg-white/5 p-2 rounded-lg">
                                            <span className="font-mono">{item.id}</span>
                                            <span className={item.status === 'yes' ? 'text-green-500' : 'text-red-500'}>{item.status === 'yes' ? 'SUCCESS' : 'FAILED'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="glass w-full max-w-sm rounded-[2rem] p-6 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-black italic text-blue-400">তারিখ সেট করুন</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-slate-500 font-bold uppercase block mb-1">HSC Exam Date</label>
                                        <input type="date" value={hscTarget} onChange={e => setHscTarget(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white outline-none focus:border-blue-500" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-500 font-bold uppercase block mb-1">BUET Admission Date</label>
                                        <input type="date" value={buetTarget} onChange={e => setBuetTarget(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white outline-none focus:border-blue-500" />
                                    </div>
                                    <button onClick={updateSettings} className="w-full py-4 bg-blue-600 rounded-xl font-black">Save Changes</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showNoteModal && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="glass w-full max-w-lg rounded-t-[2rem] md:rounded-[2rem] p-6 space-y-6 max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xl font-black italic text-blue-400">ভাসমান নোট</h3>
                                    <button onClick={() => setShowNoteModal(false)} className="p-2 text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="flex gap-2">
                                    <input type="text" value={newNote} onChange={e => setNewNote(e.target.value)} onKeyPress={e => e.key === 'Enter' && addNote()} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm outline-none" placeholder="পড়ার লক্ষ্য..." />
                                    <button onClick={addNote} className="bg-blue-600 p-3 rounded-xl"><Icon name="plus" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-2">
                                    {notes.map(n => (
                                        <div key={n.id} className="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5">
                                            <p className="text-sm text-slate-300">* {n.text}</p>
                                            <button onClick={() => database.ref(`users/${user.uid}/notes/${n.id}`).remove()} className="text-slate-600 hover:text-red-500"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showCalendar && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="glass w-full max-w-xs rounded-[2rem] p-6 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-black italic text-blue-400">পুরানো ইতিহাস</h3>
                                    <button onClick={() => setShowCalendar(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} max={new Date().toISOString().split('T')[0]} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center outline-none" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => {handleChoice('yes', selectedDate); setShowCalendar(false);}} className="py-4 bg-green-600 rounded-xl font-black">হ্যাঁ</button>
                                        <button onClick={() => {handleChoice('no', selectedDate); setShowCalendar(false);}} className="py-4 bg-red-600 rounded-xl font-black">না</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="text-center py-10 text-[10px] font-black uppercase tracking-[0.3em] text-slate-700">
                        বুয়েট অথবা কিছুই না - পড় নাইলে মর
                    </footer>
                </div>
            );
        }

        // Initialize React app when RT module is active
        window.addEventListener('load', () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>
</body>
</html>

                // গ্লোবাল ট্র্যাকার
        const occupiedLanes = new Array(12).fill(false);
        let activeNotesCount = 0; // স্ক্রিনে বর্তমানে কয়টি নোট আছে তা ট্র্যাক করবে

        const FloatingNote = ({ text, index }) => {
            const noteRef = useRef(null);

            useEffect(() => {
                const element = noteRef.current;
                if (!element) return;

                let currentLane = -1;
                let isNoteActive = false;

                const startFloating = () => {
                    // ১. স্ক্রিনে ৬টির বেশি নোট থাকলে ওয়েট করবে
                    if (activeNotesCount >= 6) {
                        setTimeout(startFloating, 2000 + Math.random() * 3000); // ২-৫ সেকেন্ড পর আবার চেক করবে
                        return;
                    }

                    // ২. খালি গলি খোঁজা
                    const availableLanes = occupiedLanes
                        .map((occ, i) => occ ? null : i)
                        .filter(i => i !== null);
                    
                    if (availableLanes.length === 0) {
                        setTimeout(startFloating, 1000);
                        return;
                    }

                    // ৩. নোট একটিভ করা এবং লেন দখল করা
                    const randomIdx = Math.floor(Math.random() * availableLanes.length);
                    currentLane = availableLanes[randomIdx];
                    occupiedLanes[currentLane] = true;
                    activeNotesCount++;
                    isNoteActive = true;

                    // ৪. স্টাইল এবং পজিশন (গ্যাপ বাড়ানোর জন্য translateX এর শুরুটা দূরে রাখা হয়েছে)
                    const topPos = 12 + (currentLane * 7); 
                    element.style.top = `${topPos}%`;
                    element.style.visibility = 'visible';

                    // ৫. র্যান্ডম স্পিড
                    const duration = Math.floor(Math.random() * 10000) + 20000; // ২০-৩০ সেকেন্ড

                    const animation = element.animate([
                        { transform: 'translateX(120vw)' }, // স্ক্রিনের অনেক বাইরে থেকে শুরু
                        { transform: 'translateX(-180vw)' } // স্ক্রিন পুরোপুরি পার হওয়া
                    ], {
                        duration: duration,
                        easing: 'linear',
                        delay: 0 
                    });

                    animation.onfinish = () => {
                        // ৬. রিসেট লজিক: স্ক্রিন পার হলে লেন এবং কাউন্ট খালি করে দেওয়া
                        if (currentLane !== -1) occupiedLanes[currentLane] = false;
                        if (isNoteActive) {
                            activeNotesCount--;
                            isNoteActive = false;
                        }
                        element.style.visibility = 'hidden';
                        
                        // নতুন সাইকেল শুরুর আগে র্যান্ডম গ্যাপ দেওয়া
                        setTimeout(startFloating, 1000 + Math.random() * 5000);
                    };
                };

                // শুরুতে সব নোট ইনভিজিবল থাকবে
                element.style.visibility = 'hidden';
                
                // প্রথমবার একেকটি নোট একেক সময় ট্রাই করা শুরু করবে যাতে শুরুতে ধাক্কা না লাগে
                const initialStartTimeout = setTimeout(startFloating, index * 1500);

                return () => {
                    clearTimeout(initialStartTimeout);
                    if (currentLane !== -1) occupiedLanes[currentLane] = false;
                    if (isNoteActive) activeNotesCount--;
                    if (element) {
                        element.getAnimations().forEach(anim => anim.cancel());
                    }
                };
            }, [index]);

            return (
                <div

                    className="fixed z-[9999] whitespace-nowrap pointer-events-none text-red-500/90 font-black italic select-none glow-text"
                    style={{ left: 0, willChange: 'transform', visibility: 'hidden' }}
                >
                    * {text}

            );

const alarmInterval = useRef(null);

// অ্যালার্ম বন্ধ করার ফাংশন

            const [timers, setTimers] = useState([]);

                if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.current.createOscillator();
                const gain = audioCtx.current.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.current.destination);
                oscillator.type = "sine";
                oscillator.frequency.value = 880;
                gain.gain.setValueAtTime(0, audioCtx.current.currentTime);
                gain.gain.linearRampToValueAtTime(1, audioCtx.current.currentTime + 0.01);
                oscillator.start(audioCtx.current.currentTime);

            };

            const [hscTarget, setHscTarget] = useState('2026-06-30');

    return (today.getFullYear() * 100) + (today.getMonth() + 1) + today.getDate();

const quote = useMemo(() => MOTIVATIONAL_QUOTES[todayIndex % MOTIVATIONAL_QUOTES.length], [todayIndex]);
const randomAyat = useMemo(() => QURAN_AYATS[todayIndex % QURAN_AYATS.length], [todayIndex]);


            const handleGoogleLogin = async () => {

            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

                        useEffect(() => {
    let interval;
    if (isTimerRunning && timerSeconds > 0) {
        interval = setInterval(() => setTimerSeconds(prev => prev - 1), 1000);
    } else if (timerSeconds === 0 && isTimerRunning) {
        setIsTimerRunning(false);

        // কন্টিনিউয়াস বিপ সাউন্ড শুরু
        if (!alarmInterval.current) {

            // কাউন্টডাউন ক্যালকুলেশন লজিক
            useEffect(() => {
                const calculateTime = () => {
                    const now = new Date().getTime();
                    
                    const hscDiff = new Date(hscTarget).getTime() - now;
                    const buetDiff = new Date(buetTarget).getTime() - now;

                    setTimeLeft({
                        hsc: {
                            d: Math.max(0, Math.floor(hscDiff / (1000 * 60 * 60 * 24))),
                            h: Math.max(0, Math.floor((hscDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)))
                        },
                        buet: {
                            d: Math.max(0, Math.floor(buetDiff / (1000 * 60 * 60 * 24))),
                            h: Math.max(0, Math.floor((buetDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)))
                        }
                    });
                };

                calculateTime(); // শুরুতে একবার রান হবে
                const timer = setInterval(calculateTime, 1000 * 60); // প্রতি এক মিনিটে আপডেট হবে
                return () => clearInterval(timer);

            const startTimer = (t) => {
                setActiveTimer(t);
                setTimerSeconds(t.minutes * 60);
                setIsTimerRunning(true);
            };

            const addCustomTimer = () => {
                const label = prompt("টাইমারের নাম:");
                const mins = parseInt(prompt("কত মিনিট?"));
                if (label && mins) {
                    database.ref(`users/${user.uid}/timers`).push().set({ label, minutes: mins });
                }
            };

            const deleteTimer = (e, id) => {
                e.stopPropagation();
                if(confirm("টাইমারটি মুছে ফেলতে চান?")) {
                    database.ref(`users/${user.uid}/timers/${id}`).remove();
                    if (activeTimer?.id === id) {
                        setActiveTimer(null);
                        setIsTimerRunning(false);
                        setTimerSeconds(0);
                    }
                }
            };

            const formatTime = (sec) => {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const last7DaysGraph = useMemo(() => {
                const days = [];
                for(let i=6; i>=0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const id = d.toISOString().split('T')[0];
                    const found = history.find(h => h.id === id);
                    days.push({ 
                        label: d.toLocaleDateString('bn-BD', {weekday: 'short'}),
                        date: d.getDate(),
                        status: found ? found.status : 'none'
                    });
                }
                return days;
            }, [history]);

            const updateSettings = () => {
                if(!user) return;
                database.ref(`users/${user.uid}/settings`).set({ hsc: hscTarget, buet: buetTarget });
                setShowSettings(false);
            };

            const handleChoice = (status, dateId = null) => {
                if (!user) return;
                const id = dateId || new Date().toISOString().split('T')[0];
                database.ref(`users/${user.uid}/history/${id}`).set({
                    status,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            };

            const addNote = () => {
                if (!user || !newNote.trim()) return;
                database.ref(`users/${user.uid}/notes`).push().set({
                    text: newNote.trim(),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                setNewNote("");
            };

            const progressValue = useMemo(() => {
                const yesCount = history.filter(h => h.status === 'yes').length;
                const noCount = history.filter(h => h.status === 'no').length;
                const net = yesCount - noCount;
                return Math.max(-95, Math.min(95, net * 3.33));
            }, [history]);

            const streak = useMemo(() => {
                let s = 0;
                for (let item of history) { if (item.status === 'yes') s++; else break; }
                return s;
            }, [history]);

            const todayStatus = history.find(h => h.id === new Date().toISOString().split('T')[0])?.status;
            const yesTotal = history.filter(h => h.status === 'yes').length;
            const noTotal = history.filter(h => h.status === 'no').length;

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950">
                    <div className="text-center space-y-4">
                        <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p className="text-blue-500 font-bold tracking-widest animate-pulse">লোড হচ্ছে...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 px-4">
                    <div className="glass p-10 rounded-[2.5rem] text-center space-y-8 w-full max-w-sm">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter">BUET<span className="text-blue-500">TRACKER</span></h1>
                        <p className="text-slate-400 text-sm">ডেটা সিঙ্ক করতে গুগল দিয়ে সাইন-ইন করুন।</p>
                        <button onClick={handleGoogleLogin} className="w-full py-4 bg-white text-black rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-200 transition-all">
                            <Icon name="log-in" size={20} /> Google দিয়ে প্রবেশ করুন
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 px-4 pt-6 md:pt-10 max-w-2xl mx-auto relative">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-[9999]">
                        {notes.map((n, i) => <FloatingNote key={n.id} text={n.text} index={i} />)}
                    </div>

                    <div className="sticky top-4 z-[50] mb-8">
                        <div className="glass rounded-2xl p-4 shadow-2xl border-white/20">
                            <div className="flex justify-between text-[10px] font-black italic mb-2 tracking-widest">
                                <span className={progressValue < 0 ? "text-red-500" : "text-slate-500"}>LOSER</span>
                                <span className={progressValue > 0 ? "text-blue-400" : "text-slate-500"}>BUETIAN</span>
                            </div>
                            <div className="h-4 bg-slate-900/80 rounded-full overflow-hidden flex relative border border-white/5">
                                <div className="absolute inset-0 flex justify-center"><div className="w-0.5 h-full bg-white/40 z-10" /></div>
                                <div className="flex-1 flex justify-end">
                                    <div className="h-full bg-gradient-to-l from-red-600 to-red-900 transition-all duration-700 ease-out" style={{ width: progressValue < 0 ? `${Math.abs(progressValue)}%` : '0%' }} />
                                </div>
                                <div className="flex-1 flex justify-start">
                                    <div className="h-full bg-gradient-to-r from-blue-600 to-blue-900 transition-all duration-700 ease-out" style={{ width: progressValue > 0 ? `${progressValue}%` : '0%' }} />
                                </div>
                            </div>
                        </div>
                    </div>

                    <header className="text-center mb-8 space-y-4">
                        <div className="flex justify-between items-center mb-4">
                           <button onClick={() => setShowSettings(true)} className="p-2 glass rounded-full text-slate-400"><Icon name="settings" size={18} /></button>
                           <button onClick={handleLogout} className="text-[10px] font-bold text-red-500 uppercase tracking-widest">Logout</button>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-black italic tracking-tighter uppercase">এটাই<span className="text-blue-500"> বাস্তবতা</span></h1>
                        <div className="glass px-4 py-2 rounded-xl inline-flex items-center gap-2 max-w-[90%] mx-auto">
                            <Icon name="quote" size={14} className="text-blue-500 shrink-0" />
                            <p className="text-slate-400 italic text-xs md:text-sm truncate">{quote}</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 gap-3 mb-8">
                        <div className="glass p-4 rounded-2xl text-center border-l-4 border-l-blue-500">
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">HSC 2026</p>
                            <p className="text-lg md:text-xl font-mono font-black">{timeLeft.hsc.d}d <span className="text-blue-500">{timeLeft.hsc.h}h</span></p>
                        </div>
                        <div className="glass p-4 rounded-2xl text-center border-l-4 border-l-purple-500">
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">BUET ADMISSION</p>
                            <p className="text-lg md:text-xl font-mono font-black">{timeLeft.buet.d}d <span className="text-purple-500">{timeLeft.buet.h}h</span></p>
                        </div>
                    </div>

                    <main className="glass border-2 border-slate-800/50 p-6 md:p-10 rounded-[2.5rem] text-center mb-8 relative overflow-hidden">
                        <div className="absolute top-4 right-6 flex gap-3">
                            <button onClick={() => setShowNoteModal(true)} className="p-2 text-slate-400 hover:text-blue-400"><Icon name="sticky-note" /></button>
                            <button onClick={() => setShowCalendar(true)} className="p-2 text-slate-400 hover:text-blue-400"><Icon name="calendar-days" /></button>
                        </div>
                        <div className="space-y-6 pt-4">
                            <h2 className="text-xl md:text-3xl font-black italic leading-tight">আজকে কি তুই নিজের <br/><span className="text-blue-500 underline decoration-2 underline-offset-4">সর্বোচ্চটা</span> দিসোস?</h2>
                            {todayStatus ? (
                                <div className="py-4 animate-in fade-in zoom-in duration-500 space-y-6">
                                    <div className={`inline-flex items-center gap-3 px-8 py-4 rounded-2xl text-xl font-black ${todayStatus === 'yes' ? 'bg-green-600' : 'bg-red-600'}`}>
                                        <Icon name={todayStatus === 'yes' ? 'check-circle' : 'x-circle'} />
                                        {todayStatus === 'yes' ? 'হ্যাঁ, দিয়েছি!' : 'না, আমি অলস।'}
                                    </div>
                                    <div className="bg-white/5 border border-white/10 rounded-2xl p-4 mt-4 italic text-blue-400 text-sm md:text-base">"{randomAyat}"</div>
                                </div>
                            ) : (
                                <div className="flex justify-center gap-4">
                                    <button onClick={() => handleChoice('yes')} className="neo-button flex-1 max-w-[140px] py-5 bg-blue-600 rounded-2xl text-2xl font-black italic">হ্যাঁ</button>
                                    <button onClick={() => handleChoice('no')} className="neo-button flex-1 max-w-[140px] py-5 glass rounded-2xl text-2xl font-black italic">না</button>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="glass p-6 rounded-3xl mb-8">
                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-6 flex items-center gap-2">
                            <Icon name="bar-chart-3" size={12} /> Last 7 Days Performance
                        </h3>
                        <div className="flex justify-between items-end h-24 px-2">
                            {last7DaysGraph.map((day, i) => (
                                <div key={i} className="flex flex-col items-center gap-2 flex-1">
                                    <div className={`w-full max-w-[10px] rounded-full graph-bar ${
                                        day.status === 'yes' ? 'bg-blue-500 h-20 shadow-[0_0_15px_rgba(59,130,246,0.5)]' : 
                                        day.status === 'no' ? 'bg-red-500 h-10 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'bg-slate-800 h-2'
                                    }`} />
                                    <span className="text-[8px] font-bold text-slate-500 uppercase">{day.label}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-4 gap-2 mb-8">
                        {[
                            { label: 'Streak', val: streak, icon: 'flame', color: 'text-orange-500' },
                            { label: 'Success', val: yesTotal, icon: 'target', color: 'text-green-500' },
                            { label: 'Failure', val: noTotal, icon: 'info', color: 'text-red-500' },
                            { label: 'Ratio', val: (history.length ? Math.round((yesTotal/history.length)*100) : 0) + '%', icon: 'trending-up', color: 'text-blue-400' }
                        ].map((s, i) => (
                            <div key={i} className="glass p-3 rounded-xl text-center">
                                <Icon name={s.icon} size={16} className={`${s.color} mb-1`} />
                                <p className="text-[8px] font-black text-slate-500 uppercase">{s.label}</p>
                                <p className="text-sm font-black">{s.val}</p>
                            </div>
                        ))}
                    </div>

                    <div className="glass p-6 rounded-3xl mb-8">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 flex items-center gap-2"><Icon name="timer" size={12} /> Focus Timer</h3>
                            <button onClick={addCustomTimer} className="text-blue-500"><Icon name="plus-circle" size={18} /></button>
                        </div>
                        
                                             {activeTimer && (
    <div className={`border-2 rounded-2xl p-6 mb-4 text-center transition-all duration-300 ${isAlarmPlaying ? 'bg-red-600/40 border-red-500 animate-pulse' : 'bg-blue-600/20 border-blue-500/30'}`}>
        <p className="text-xs font-bold text-blue-400 uppercase mb-1">{activeTimer.label}</p>
        
        {isAlarmPlaying ? (
            <div className="py-2">
                <p className="text-2xl font-black text-white glow-text mb-4 uppercase italic">Time's Up! Focus!</p>
                <button onClick={stopAlarm} className="bg-white text-red-600 px-8 py-3 rounded-xl font-black shadow-lg neo-button">
                    STOP ALARM
                </button>
            </div>
        ) : (
            <>
                <p className="text-5xl font-mono font-black mb-4">{formatTime(timerSeconds)}</p>
                <div className="flex justify-center gap-3">
                    <button onClick={() => setIsTimerRunning(!isTimerRunning)} className="bg-blue-600 px-6 py-2 rounded-xl font-bold">
                        {isTimerRunning ? 'Pause' : 'Resume'}
                    </button>
                    <button onClick={() => {setIsTimerRunning(false); setTimerSeconds(0); setActiveTimer(null);}} className="bg-slate-800 px-6 py-2 rounded-xl font-bold">Stop</button>
                </div>
            </>
        )}
    </div>
)}



                        <div className="flex gap-2 overflow-x-auto pb-2 scroll-hide">
                            {timers.map(t => (
                                <div key={t.id} className="relative group shrink-0">
                                    <button onClick={() => startTimer(t)} className="glass px-4 py-2 rounded-xl whitespace-nowrap text-xs font-bold hover:border-blue-500 transition-all flex items-center gap-2">
                                        {t.label} ({t.minutes}m)
                                        <div onClick={(e) => deleteTimer(e, t.id)} className="p-1 hover:text-red-500">
                                            <Icon name="trash-2" size={12} />
                                        </div>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-4">
                        <div className="flex justify-between items-center px-2">
                            <h3 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 flex items-center gap-2"><Icon name="history" size={12} /> Recent History</h3>
                            <button onClick={() => setShowFullHistory(true)} className="text-[10px] font-bold text-blue-500 uppercase">View All</button>
                        </div>
                        <div className="glass rounded-2xl divide-y divide-slate-800/50 max-h-60 overflow-y-auto pr-1">
                            {history.length === 0 ? <p className="p-10 text-center text-slate-600 italic text-sm">কোনো রেকর্ড নেই</p> : history.slice(0, 7).map(item => (
                                <div key={item.id} className="flex items-center justify-between p-4 hover:bg-white/5 transition-colors">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-1.5 h-1.5 rounded-full ${item.status === 'yes' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]'}`} />
                                        <div>
                                            <p className="text-xs font-bold">{item.id.split('-').reverse().join('/')}</p>
                                            <p className="text-[9px] text-slate-500 uppercase">{new Date(item.id).toLocaleDateString('bn-BD', { weekday: 'long' })}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => database.ref(`users/${user.uid}/history/${item.id}`).remove()} className="text-slate-700 hover:text-red-500 transition-colors"><Icon name="trash-2" size={14}/></button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showFullHistory && (
                        <div className="fixed inset-0 z-[101] bg-black/90 backdrop-blur-lg flex items-center justify-center p-4">
                            <div className="glass w-full max-w-md rounded-[2.5rem] p-8 space-y-6 max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xl font-black italic text-blue-400 uppercase">Full History</h3>
                                    <button onClick={() => setShowFullHistory(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="grid grid-cols-7 gap-2 pb-6 border-b border-white/5">
                                    {history.map(item => (
                                        <div key={item.id} title={item.id} className="flex flex-col items-center gap-1">
                                            <div className={`calendar-dot ${item.status === 'yes' ? 'bg-green-500' : 'bg-red-500'}`} />
                                            <span className="text-[7px] text-slate-500">{item.id.split('-')[2]}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-2">
                                    {history.map(item => (
                                        <div key={item.id} className="flex justify-between text-[11px] text-slate-400 bg-white/5 p-2 rounded-lg">
                                            <span className="font-mono">{item.id}</span>
                                            <span className={item.status === 'yes' ? 'text-green-500' : 'text-red-500'}>{item.status === 'yes' ? 'SUCCESS' : 'FAILED'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="glass w-full max-w-sm rounded-[2rem] p-6 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-black italic text-blue-400">তারিখ সেট করুন</h3>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-slate-500 font-bold uppercase block mb-1">HSC Exam Date</label>
                                        <input type="date" value={hscTarget} onChange={e => setHscTarget(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white outline-none focus:border-blue-500" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-slate-500 font-bold uppercase block mb-1">BUET Admission Date</label>
                                        <input type="date" value={buetTarget} onChange={e => setBuetTarget(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white outline-none focus:border-blue-500" />
                                    </div>
                                    <button onClick={updateSettings} className="w-full py-4 bg-blue-600 rounded-xl font-black">Save Changes</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showNoteModal && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="glass w-full max-w-lg rounded-t-[2rem] md:rounded-[2rem] p-6 space-y-6 max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xl font-black italic text-blue-400">ভাসমান নোট</h3>
                                    <button onClick={() => setShowNoteModal(false)} className="p-2 text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="flex gap-2">
                                    <input type="text" value={newNote} onChange={e => setNewNote(e.target.value)} onKeyPress={e => e.key === 'Enter' && addNote()} className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm outline-none" placeholder="পড়ার লক্ষ্য..." />
                                    <button onClick={addNote} className="bg-blue-600 p-3 rounded-xl"><Icon name="plus" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-2">
                                    {notes.map(n => (
                                        <div key={n.id} className="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5">
                                            <p className="text-sm text-slate-300">* {n.text}</p>
                                            <button onClick={() => database.ref(`users/${user.uid}/notes/${n.id}`).remove()} className="text-slate-600 hover:text-red-500"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showCalendar && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="glass w-full max-w-xs rounded-[2rem] p-6 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-black italic text-blue-400">পুরানো ইতিহাস</h3>
                                    <button onClick={() => setShowCalendar(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} max={new Date().toISOString().split('T')[0]} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center outline-none" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => {handleChoice('yes', selectedDate); setShowCalendar(false);}} className="py-4 bg-green-600 rounded-xl font-black">হ্যাঁ</button>
                                        <button onClick={() => {handleChoice('no', selectedDate); setShowCalendar(false);}} className="py-4 bg-red-600 rounded-xl font-black">না</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="text-center py-10 text-[10px] font-black uppercase tracking-[0.3em] text-slate-700">
                        বুয়েট অথবা কিছুই না - পড় নাইলে মর
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

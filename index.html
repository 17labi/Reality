    <script>

        
    const firebaseConfig = {
        apiKey: "AIzaSyBtSqPxbB_-tuOWbor-ipHPrtx4gA3yNGA",
        authDomain: "buet-tracker.firebaseapp.com",
        projectId: "buet-tracker",
        storageBucket: "buet-tracker.firebasestorage.app",
        messagingSenderId: "296969097637",
        appId: "1:296969097637:web:3d77b2818501f2951c184c",
        measurementId: "G-0CS4ZWD0BH",
        databaseURL: "https://buet-tracker-default-rtdb.firebaseio.com/"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const database = firebase.database();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // PWA and Offline Functionality
    let isOnline = navigator.onLine;
    let offlineQueue = [];
    let db = null;

    // Initialize IndexedDB for offline storage
    function initOfflineDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('UnifiedTrackerOffline', 1);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = () => {
                const database = request.result;
                
                // Create offline queue store
                if (!database.objectStoreNames.contains('offlineQueue')) {
                    const store = database.createObjectStore('offlineQueue', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('timestamp', 'timestamp', { unique: false });
                    store.createIndex('type', 'type', { unique: false });
                }
                
                // Create offline topics store
                if (!database.objectStoreNames.contains('offlineTopics')) {
                    const topicsStore = database.createObjectStore('offlineTopics', { keyPath: 'id' });
                    topicsStore.createIndex('createdAt', 'createdAt', { unique: false });
                }
                
                // Create offline logs store
                if (!database.objectStoreNames.contains('offlineLogs')) {
                    const logsStore = database.createObjectStore('offlineLogs', { keyPath: 'id', autoIncrement: true });
                    logsStore.createIndex('timestamp', 'timestamp', { unique: false });
                }
            };
        });
    }

    // Save data to offline queue
    function saveToOfflineQueue(action, data) {
        if (!db) return;
        
        const transaction = db.transaction(['offlineQueue'], 'readwrite');
        const store = transaction.objectStore('offlineQueue');
        
        const queueItem = {
            action: action,
            data: data,
            timestamp: Date.now(),
            synced: false
        };
        
        store.add(queueItem);
        console.log('Saved to offline queue:', action, data);
    }

    // Save topics offline
    function saveTopicsOffline(topicsData) {
        if (!db) return;
        
        const transaction = db.transaction(['offlineTopics'], 'readwrite');
        const store = transaction.objectStore('offlineTopics');
        
        topicsData.forEach(topic => {
            store.put(topic);
        });
    }

    // Load topics from offline storage
    function loadTopicsOffline() {
        return new Promise((resolve, reject) => {
            if (!db) {
                resolve([]);
                return;
            }
            
            const transaction = db.transaction(['offlineTopics'], 'readonly');
            const store = transaction.objectStore('offlineTopics');
            const request = store.getAll();
            
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    // Sync offline data when online
    async function syncOfflineData() {
        if (!db || !currentUser || !isOnline) return;
        
        const transaction = db.transaction(['offlineQueue'], 'readwrite');
        const store = transaction.objectStore('offlineQueue');
        const request = store.getAll();
        
        request.onsuccess = async () => {
            const queueItems = request.result.filter(item => !item.synced);
            
            for (const item of queueItems) {
                try {
                    switch (item.action) {
                        case 'addTopic':
                            await database.ref(`users/${currentUser.uid}/spacedRepetition/topics`).push().set(item.data);
                            break;
                        case 'updateTopic':
                            await database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${item.data.id}`).update(item.data.updates);
                            break;
                        case 'deleteTopic':
                            await database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${item.data.id}`).remove();
                            break;
                        case 'addLog':
                            await database.ref(`users/${currentUser.uid}/spacedRepetition/logs`).push().set(item.data);
                            break;
                    }
                    
                    // Mark as synced
                    const updateTransaction = db.transaction(['offlineQueue'], 'readwrite');
                    const updateStore = updateTransaction.objectStore('offlineQueue');
                    item.synced = true;
                    updateStore.put(item);
                    
                    console.log('Synced offline item:', item.action);
                } catch (error) {
                    console.error('Failed to sync item:', item, error);
                }
            }
            
            showNotification('ডেটা সিঙ্ক সম্পন্ন', 'অফলাইন ডেটা সফলভাবে আপলোড হয়েছে!');
        };
    }

    // Network status monitoring
    window.addEventListener('online', () => {
        isOnline = true;
        updateConnectionStatus();
        console.log('Back online - syncing data...');
        syncOfflineData();
        showNotification('ইন্টারনেট সংযোগ', 'অনলাইনে ফিরে এসেছেন। ডেটা সিঙ্ক করা হচ্ছে...');
    });

    window.addEventListener('offline', () => {
        isOnline = false;
        updateConnectionStatus();
        console.log('Gone offline - will queue data');
        showNotification('অফলাইন মোড', 'ইন্টারনেট সংযোগ নেই। ডেটা অফলাইনে সেভ হবে।');
    });

    // Update connection status indicator
    function updateConnectionStatus() {
        const statusElement = document.getElementById('connection-status');
        if (statusElement) {
            if (isOnline) {
                statusElement.textContent = 'System Pulse';
                statusElement.className = 'text-[9px] font-bold text-slate-400 uppercase tracking-widest';
            } else {
                statusElement.textContent = 'Offline Mode';
                statusElement.className = 'text-[9px] font-bold text-orange-500 uppercase tracking-widest';
            }
        }
    }

    // Show notification
    function showNotification(title, body) {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, {
                body: body,
                icon: 'https://i.postimg.cc/TYHBdFH8/Gemini-Generated-Image-hf8x9dhf8x9dhf8x.png',
                badge: 'https://i.postimg.cc/TYHBdFH8/Gemini-Generated-Image-hf8x9dhf8x9dhf8x.png'
            });
        }
    }

    // Request notification permission
    function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')

// === FIREBASE DATA LISTENERS ===
function initializeFirebaseListeners(uid) {
    topicsListener = database.ref(`users/${uid}/spacedRepetition/topics`).on('value', (snapshot) => {
        const data = snapshot.val();
        topics = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => b.createdAt - a.createdAt) : [];
        render();
        updateSidebarStats();
    });

    logsListener = database.ref(`users/${uid}/spacedRepetition/logs`).limitToLast(200).on('value', (snapshot) => {
        const data = snapshot.val();
        logs = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)) : [];
        if (currentTab === 'history') render();
    });
}

function cleanupFirebaseListeners() {
    if (topicsListener && currentUser) {
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics`).off('value', topicsListener);
        database.ref(`users/${currentUser.uid}/spacedRepetition/logs`).off('value', logsListener);
    }
}

// === DATA MIGRATION ===
function migrateLocalStorageToFirebase(uid) {
    const migrationKey = `migration_done_${uid}`;
    if (localStorage.getItem(migrationKey)) return;

    const localTopics = JSON.parse(localStorage.getItem('ss_ultra_v3')) || [];
    const localLogs = JSON.parse(localStorage.getItem('ss_ultra_logs')) || [];
    
    if (localTopics.length === 0 && localLogs.length === 0) {
        localStorage.setItem(migrationKey, 'true');
        return;
    }

    if (confirm(`${localTopics.length}টি টপিক Firebase-এ স্থানান্তর করতে চান?`)) {
        localTopics.forEach(topic => {
            database.ref(`users/${uid}/spacedRepetition/topics`).push().set({
                name: topic.name,
                revCount: topic.revCount,
                startTime: topic.startTime,
                nextDate: topic.nextDate,
                createdAt: topic.createdAt
            });
        });

        localLogs.forEach(log => {
            database.ref(`users/${uid}/spacedRepetition/logs`).push().set({
                topicName: log.topicName,
                action: log.action,
                type: log.type,
                time: log.time,
                timestamp: log.id || Date.now()
            });
        });

        localStorage.setItem(migrationKey, 'true');
        alert("ডেটা সফলভাবে স্থানান্তরিত হয়েছে!");
    }
}

        function calculateMetrics(topic) {
            const now = Date.now();
            const elapsedMs = now - topic.startTime;
            const elapsedHours = elapsedMs / 3600000;
            const gapIndex = Math.min(topic.revCount, SCIENTIFIC_GAPS.length - 1);
            const currentGapDays = SCIENTIFIC_GAPS[gapIndex] || (topic.revCount * 30);
            const nextGapDays = SCIENTIFIC_GAPS[gapIndex + 1] || (currentGapDays + 30);
            const totalCycleMs = nextGapDays * 86400000;
            const remainingMs = topic.nextDate - now;

            const baseRetention = 80 + (topic.revCount * 4);
            const stabilityFactor = Math.max(24, currentGapDays * 24 * (1 + topic.revCount * 0.5));
            const currentRetention = baseRetention * Math.exp(-elapsedHours / stabilityFactor);
            const brainSave = Math.max(5, Math.min(100, Math.round(currentRetention)));

            let battery = 100;
            const gracePeriod = 24 * 3600000;
            if (elapsedMs > gracePeriod) {
                const effectiveElapsed = elapsedMs - gracePeriod;
                const effectiveTotal = totalCycleMs - gracePeriod;
                battery = 100 - (effectiveElapsed / effectiveTotal * 100);
            }
            battery = Math.max(0, Math.min(100, Math.round(battery)));

            let color = 'bg-indigo-500';
            let textColor = 'text-indigo-600';
            if (battery < 25) { color = 'bg-rose-500'; textColor = 'text-rose-600'; }
            else if (battery < 50) { color = 'bg-orange-500'; textColor = 'text-orange-600'; }
            else if (battery < 75) { color = 'bg-amber-500'; textColor = 'text-amber-600'; }

            let timerStr = "এখনই রিভাইজ দিন";
            if (remainingMs > 0) {
                const h = Math.floor(remainingMs / 3600000);
                const m = Math.floor((remainingMs % 3600000) / 60000);
                timerStr = `${h}ঘণ্টা ${m}মিনিট পর`;
            }

            return {
                battery, color, textColor, brainSave, isDue: now >= topic.nextDate,
                timerStr,
                addedStr: new Date(topic.createdAt).toLocaleDateString('bn-BD'),
                nextDateStr: new Date(topic.nextDate).toLocaleDateString('bn-BD', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                })
            };
        }

       function addLog(topicName, action, type) {
    const logData = {
        topicName, action, type,
        time: new Date().toLocaleString('bn-BD', { hour12: true }),
        timestamp: Date.now()
    };

    if (currentUser && isOnline) {
        // Online: Save to Firebase
        database.ref(`users/${currentUser.uid}/spacedRepetition/logs`).push().set({
            ...logData,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).catch((error) => {
            console.error("Log error:", error);
            // If Firebase fails, save offline
            addLogOffline(topicName, action, type);
        });
    } else {
        // Offline: Save locally
        addLogOffline(topicName, action, type);
    }
}

function addLogOffline(topicName, action, type) {
    const logData = {
        id: 'offline_' + Date.now(),
        topicName, action, type,
        time: new Date().toLocaleString('bn-BD', { hour12: true }),
        timestamp: Date.now()
    };
    
    // Add to local logs array
    logs.unshift(logData);
    if (logs.length > 200) logs.pop();
    
    // Save to IndexedDB
    if (db) {
        const transaction = db.transaction(['offlineLogs'], 'readwrite');
        const store = transaction.objectStore('offlineLogs');
        store.add(logData);
    }
    
    // Save to offline queue for sync
    saveToOfflineQueue('addLog', {
        topicName, action, type,
        time: logData.time,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    });
}

      function addTopic(name, customDate = null) {
    if (!name.trim()) return;
    
    const createdAt = customDate ? new Date(customDate).getTime() : Date.now();
    const topicData = {
        name: name.trim(),
        revCount: 0,
        startTime: createdAt,
        nextDate: createdAt + 86400000,
        createdAt: createdAt
    };

    if (currentUser && isOnline) {
        // Online: Save to Firebase
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics`).push().set(topicData)
            .then(() => addLog(name, "নতুন রেকর্ড যোগ করা হয়েছে", "added"))
            .catch((error) => {
                console.error("Error:", error);
                // If Firebase fails, save offline
                saveToOfflineQueue('addTopic', topicData);
                addTopicOffline(topicData);
                showNotification('অফলাইন সেভ', 'টপিক অফলাইনে সেভ হয়েছে');
            });
    } else {
        // Offline: Save locally
        topicData.id = 'offline_' + Date.now();
        addTopicOffline(topicData);
        saveToOfflineQueue('addTopic', topicData);
        showNotification('অফলাইন মোড', 'টপিক অফলাইনে সেভ হয়েছে। অনলাইন হলে সিঙ্ক হবে।');
    }
}

function addTopicOffline(topicData) {
    // Add to local topics array
    topics.unshift(topicData);
    
    // Save to IndexedDB
    if (db) {
        const transaction = db.transaction(['offlineTopics'], 'readwrite');
        const store = transaction.objectStore('offlineTopics');
        store.put(topicData);
    }
    
    // Update UI
    render();
    updateSidebarStats();
}
function handleReview(id) {
    const topic = topics.find(t => t.id === id);
    if (!topic) return;

    const now = Date.now();
    const newRevCount = topic.revCount + 1;
    const days = SCIENTIFIC_GAPS[Math.min(newRevCount, SCIENTIFIC_GAPS.length - 1)];
    
    const updates = {
        revCount: newRevCount,
        startTime: now,
        nextDate: now + (days * 86400000)
    };

    if (currentUser && isOnline) {
        // Online: Update Firebase
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${id}`).update(updates)
            .then(() => addLog(topic.name, "রিভিশন সম্পন্ন হয়েছে", "revised"))
            .catch((error) => {
                console.error("Error:", error);
                // If Firebase fails, save offline
                saveToOfflineQueue('updateTopic', { id: id, updates: updates });
                updateTopicOffline(id, updates);
            });
    } else {
        // Offline: Update locally
        updateTopicOffline(id, updates);
        saveToOfflineQueue('updateTopic', { id: id, updates: updates });
        addLogOffline(topic.name, "রিভিশন সম্পন্ন হয়েছে", "revised");
        showNotification('অফলাইন রিভিউ', 'রিভিশন অফলাইনে সেভ হয়েছে');
    }
}

function updateTopicOffline(id, updates) {
    // Update local topics array
    const topicIndex = topics.findIndex(t => t.id === id);
    if (topicIndex !== -1) {
        Object.assign(topics[topicIndex], updates);
        
        // Save to IndexedDB
        if (db) {
            const transaction = db.transaction(['offlineTopics'], 'readwrite');
            const store = transaction.objectStore('offlineTopics');
            store.put(topics[topicIndex]);
        }
        
        // Update UI
        render();
        updateSidebarStats();
    }
}

        const occupiedLanes = new Array(12).fill(false);

        const FloatingNote = ({ text, index }) => {
            const noteRef = useRef(null);

            useEffect(() => {
                const element = noteRef.current;
                if (!element) return;

                let currentLane = -1;
                let isNoteActive = false;

                const startFloating = () => {
                    if (activeNotesCount >= 6) {
                        setTimeout(startFloating, 2000 + Math.random() * 3000);
                        return;
                    }

                    const availableLanes = occupiedLanes
                        .map((occ, i) => occ ? null : i)
                        .filter(i => i !== null);
                    
                    if (availableLanes.length === 0) {
                        setTimeout(startFloating, 1000);
                        return;
                    }

                    const randomIdx = Math.floor(Math.random() * availableLanes.length);
                    currentLane = availableLanes[randomIdx];
                    occupiedLanes[currentLane] = true;
                    activeNotesCount++;
                    isNoteActive = true;

                    const topPos = 12 + (currentLane * 7); 
                    element.style.top = `${topPos}%`;
                    element.style.visibility = 'visible';

                    const duration = Math.floor(Math.random() * 40000) + 60000;

                    const animation = element.animate([
                        { transform: 'translateX(120vw)' },
                        { transform: 'translateX(-180vw)' }
                    ], {
                        duration: duration,
                        easing: 'linear',
                        delay: 0 
                    });

                    animation.onfinish = () => {
                        if (currentLane !== -1) occupiedLanes[currentLane] = false;
                        if (isNoteActive) {
                            activeNotesCount--;
                            isNoteActive = false;
                        }
                        element.style.visibility = 'hidden';
                        setTimeout(startFloating, 1000 + Math.random() * 5000);
                    };
                };

                element.style.visibility = 'hidden';
                const initialStartTimeout = setTimeout(startFloating, index * 3000);

                return () => {
                    clearTimeout(initialStartTimeout);
                    if (currentLane !== -1) occupiedLanes[currentLane] = false;
                    if (isNoteActive) activeNotesCount--;
                    if (element) {
                        element.getAnimations().forEach(anim => anim.cancel());
                    }
                };
            }, [index]);

            return (
                <div 
                    ref={noteRef}
                    className="fixed z-[9999] whitespace-nowrap pointer-events-none text-red-500/90 font-black italic select-none glow-text"
                    style={{ left: 0, willChange: 'transform', visibility: 'hidden' }}
                >
                    * {text}
                </div>
            );

                    const buetDiff = new Date(buetTarget).getTime() - now;

                    setTimeLeft({
                        hsc: {
                            d: Math.max(0, Math.floor(hscDiff / (1000 * 60 * 60 * 24))),
                            h: Math.max(0, Math.floor((hscDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)))
                        },
                        buet: {
                            d: Math.max(0, Math.floor(buetDiff / (1000 * 60 * 60 * 24))),
                            h: Math.max(0, Math.floor((buetDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)))
                        }
                    });

                calculateTime();
                const timer = setInterval(calculateTime, 1000 * 60);
                return () => clearInterval(timer);

                        </div>
                    )}

                    {showCalendar && (
                        <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="glass w-full max-w-xs rounded-[2rem] p-6 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-black italic text-blue-400">পুরানো ইতিহাস</h3>
                                    <button onClick={() => setShowCalendar(false)} className="text-slate-400"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-4">
                                    <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} max={new Date().toISOString().split('T')[0]} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white text-center outline-none" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => {handleChoice('yes', selectedDate); setShowCalendar(false);}} className="py-4 bg-green-600 rounded-xl font-black">হ্যাঁ</button>
                                        <button onClick={() => {handleChoice('no', selectedDate); setShowCalendar(false);}} className="py-4 bg-red-600 rounded-xl font-black">না</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="text-center py-10 text-[10px] font-black uppercase tracking-[0.3em] text-slate-700">
                        বুয়েট অথবা কিছুই না - পড় নাইলে মর
                    </footer>
                </div>
            );
        }

        // Initialize React app when RT module is active
        window.addEventListener('load', () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>
</body>
</html>

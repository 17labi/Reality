<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unified Tracker - Spaced Repetition & Reality Tracking</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Scientific spaced repetition and reality tracking app for BUET students">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Unified Tracker">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/632FV6Pt/Gemini-Generated-Image-rqluzxrqluzxrqlu-removebg-preview.png">
    <link rel="manifest" href="/manifest.json">
    
    <!-- CDN Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Global Styles */
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Hind Siliguri', sans-serif; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Global Tab Navigation Styles */
        .global-tab-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .global-tab-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
        }
        
        .global-tab-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* Hide emoji on mobile to save space */
        .global-tab-btn span:first-child {
            display: none;
        }
        
        /* Desktop styles */
        @media (min-width: 768px) {
            .global-tab-container {
                padding: 1rem 1.5rem;
                gap: 1rem;
            }
            
            .global-tab-btn {
                padding: 0.75rem 2rem;
                border-radius: 1rem;
                font-size: 0.875rem;
                gap: 0.5rem;
            }
            
            /* Show emoji on desktop */
            .global-tab-btn span:first-child {
                display: inline;
            }
        }
        
        .global-tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }
        
        .global-tab-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }
        
        .module-container {
            display: none;
            padding-top: 60px;
        }
        
        /* Desktop padding */
        @media (min-width: 768px) {
            .module-container {
                padding-top: 80px;
            }
        }
        
        .module-container.active {
            display: block;
        }
        
        /* Spaced Repetition Module Styles */
        .sr-module {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            letter-spacing: -0.01em;
            min-height: 100vh;
        }
        
        .sr-module .font-bn { font-family: 'Hind Siliguri', sans-serif; }
        .sr-module .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .sr-module .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .sr-module .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .sr-module .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .sr-module .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sr-module .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px -4px rgba(0, 0, 0, 0.08);
        }
        
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .sr-module .animate-due-warning { 
            border: 2px solid #fb7185 !important;
            animation: pulse-border 2s infinite;
        }
        
        .sr-module .tab-active { 
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white; 
            box-shadow: 0 8px 20px -4px rgba(79, 70, 229, 0.4); 
        }
        
        .sr-module .progress-bar-bg { background: #f1f5f9; border-radius: 999px; height: 6px; overflow: hidden; }
        .sr-module .progress-bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .sr-module .sidebar-item { transition: all 0.3s ease; }
        .sr-module .sidebar-item:hover:not(.tab-active) { background: rgba(255, 255, 255, 0.05); }
        
        .sr-module .log-entry-added { border-left: 5px solid #0ea5e9; }
        .sr-module .log-entry-revised { border-left: 5px solid #84cc16; }
        .sr-module .log-entry-deleted { border-left: 5px solid #f43f5e; }
        
        .sr-module .chart-container { position: relative; height: 300px; width: 100%; }
        
        .sr-module .chart-container-scrollable { 
            position: relative; 
            height: 300px; 
            min-width: 600px;
        }
        
        .sr-module .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Reality Tracking Module Styles */
        .rt-module {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Hind Siliguri', sans-serif;
            min-height: 100vh;
        }
        
        @keyframes float-rtl {
            0% { transform: translateX(110vw); }
            100% { transform: translateX(-150vw); }
        }
        
        .rt-module .animate-float-rtl {
            animation: float-rtl linear infinite;
        }
        
        .rt-module .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .rt-module .neo-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .rt-module .neo-button:active {
            transform: scale(0.95);
        }
        
        .rt-module .glow-text {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5), 0 0 20px rgba(239, 68, 68, 0.2);
        }
        
        .rt-module ::-webkit-scrollbar { width: 4px; }
        .rt-module ::-webkit-scrollbar-track { background: #020617; }
        .rt-module ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .rt-module input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        
        .rt-module .graph-bar {
            transition: height 1s ease-out;
        }
        
        .rt-module .calendar-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <!-- Global Tab Navigation -->
    <div class="global-tab-nav">
        <div class="global-tab-container">
            <button id="tab-sr" class="global-tab-btn active" onclick="switchGlobalTab('sr')">
                
                <span>Spaced Repetition</span>
            </button>
            <button id="tab-rt" class="global-tab-btn" onclick="switchGlobalTab('rt')">
                
                <span>Reality Tracking</span>
            </button>
        </div>
    </div>

    <!-- Spaced Repetition Module -->
    <div id="sr-module" class="module-container sr-module active">
        <div id="sr-app" class="flex flex-col md:flex-row h-screen overflow-hidden">
            <!-- Smart Sidebar -->
            <aside class="order-2 md:order-1 fixed bottom-0 left-0 right-0 md:relative md:w-24 lg:w-72 bg-[#020617] text-white flex md:flex-col z-50 p-2 md:p-6 shrink-0 font-bn">
                <div class="hidden md:flex items-center gap-4 mb-12 px-2">
                    <div class="w-12 h-12 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-500/20">
                        <i data-lucide="zap" class="w-7 h-7 text-white"></i>
                    </div>
                    <div class="hidden lg:block">
                        <h1 class="font-black text-xl tracking-tighter leading-none">Memory</h1>
                        <span class="text-[10px] text-indigo-400 font-bold tracking-widest uppercase">Neural Brain Tool</span>
                    </div>
                </div>
                
                <nav class="flex md:flex-col w-full gap-1 md:gap-3">
                    <button onclick="switchTab('dashboard')" id="nav-dashboard" class="sidebar-item tab-active flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 md:p-3 lg:p-4 rounded-xl md:rounded-2xl flex-1 md:flex-none">
                        <i data-lucide="layout-grid" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span class="text-[8px] md:text-[10px] lg:text-sm font-bold uppercase tracking-wide hidden md:block">ড্যাশবোর্ড</span>
                    </button>
                    <button onclick="switchTab('focus')" id="nav-focus" class="sidebar-item text-slate-500 flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 md:p-3 lg:p-4 rounded-xl md:rounded-2xl flex-1 md:flex-none">
                        <i data-lucide="brain-circuit" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span class="text-[8px] md:text-[10px] lg:text-sm font-bold uppercase tracking-wide hidden md:block">রিভিশন ডিউ</span>
                    </button>
                    <button onclick="switchTab('history')" id="nav-history" class="sidebar-item text-slate-500 flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 md:p-3 lg:p-4 rounded-xl md:rounded-2xl flex-1 md:flex-none">
                        <i data-lucide="scroll-text" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span class="text-[8px] md:text-[10px] lg:text-sm font-bold uppercase tracking-wide hidden md:block">ইতিহাস</span>
                    </button>
                    <button onclick="switchTab('analytics')" id="nav-analytics" class="sidebar-item text-slate-500 flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 md:p-3 lg:p-4 rounded-xl md:rounded-2xl flex-1 md:flex-none">
                        <i data-lucide="line-chart" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span class="text-[8px] md:text-[10px] lg:text-sm font-bold uppercase tracking-wide hidden md:block">বিশ্লেষণ</span>
                    </button>
                    <button onclick="switchTab('notes')" id="nav-notes" class="sidebar-item text-slate-500 flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 md:p-3 lg:p-4 rounded-xl md:rounded-2xl flex-1 md:flex-none">
                        <i data-lucide="notebook" class="w-4 h-4 md:w-5 md:h-5"></i>
                        <span class="text-[8px] md:text-[10px] lg:text-sm font-bold uppercase tracking-wide hidden md:block">নোটস</span>
                    </button>
                </nav>

                <div class="hidden lg:block mt-auto p-4 bg-white/5 rounded-2xl border border-white/10">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">ব্রেইন হেলথ</p>
                    <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                        <div id="sidebar-retention-fill" class="h-full bg-indigo-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </aside>

            <!-- Main Workspace -->
            <main class="order-1 md:order-2 flex-1 flex flex-col h-[calc(100vh-64px)] md:h-screen overflow-hidden">
                <header class="h-16 md:h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 px-3 md:px-10 flex items-center justify-between sticky top-0 z-40 shrink-0 font-bn">
                    <div class="flex-1 max-w-xl relative group">
                        <i data-lucide="search" class="absolute left-3 md:left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4 md:w-5 md:h-5 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input id="search-input" type="text" placeholder="পড়া বা ইতিহাস খুঁজুন..." oninput="render()" 
                               class="w-full pl-10 md:pl-12 pr-3 md:pr-4 py-2 md:py-3 bg-slate-100/50 border border-transparent focus:border-indigo-500/30 focus:bg-white rounded-xl md:rounded-2xl text-sm outline-none font-bn transition-all shadow-sm">
                    </div>
                    
                  <div class="flex items-center gap-2 md:gap-4 ml-3 md:ml-6">
    <div id="user-profile-container"></div>
    <div class="hidden sm:flex flex-col items-end">
        <span id="live-clock" class="text-sm md:text-lg font-mono font-black text-slate-800 leading-none tracking-tighter">00:00:00</span>
        <div class="flex items-center gap-1.5">
            <span class="relative flex h-1.5 w-1.5 md:h-2 md:w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-1.5 w-1.5 md:h-2 md:w-2 bg-indigo-500"></span>
            </span>
            <span class="text-[8px] md:text-[9px] font-bold text-slate-400 uppercase tracking-widest" id="connection-status">System Pulse</span>
        </div>
    </div>
    <button onclick="toggleModal(true)" class="group bg-slate-900 hover:bg-indigo-600 text-white p-2.5 md:p-3.5 rounded-xl md:rounded-2xl shadow-xl transition-all duration-300 active:scale-90">
        <i data-lucide="plus" class="w-5 h-5 md:w-6 md:h-6 group-hover:rotate-90 transition-transform"></i>
    </button>
</div>
                </header>

                <div id="content-area" class="flex-1 overflow-y-auto p-3 md:p-10 custom-scrollbar pb-20 md:pb-32">
                    <!-- Content Injected Here -->
                </div>
            </main>

            <!-- Ultra Modal -->
            <div id="modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-md z-[100] flex items-center justify-center p-3 md:p-4">
                <div class="bg-white w-full max-w-lg rounded-[1.5rem] md:rounded-[2.5rem] p-6 md:p-10 shadow-2xl font-bn border border-slate-100">
                    <div class="flex justify-between items-center mb-6 md:mb-8">
                        <div>
                            <h2 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">নতুন সিঙ্ক যোগ করুন</h2>
                            <p class="text-xs md:text-sm text-slate-400 font-bold">আপনার রিটেনশন ট্র্যাকিং শুরু করুন</p>
                        </div>
                        <button onclick="toggleModal(false)" class="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-rose-500 transition-colors"><i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6"></i></button>
                    </div>
                    <div class="space-y-4 md:space-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">বিষয়ের বিবরণ</label>
                            <textarea id="modal-name" placeholder="বিস্তারিত লিখুন..." class="w-full p-4 md:p-5 bg-slate-50 border border-slate-100 rounded-2xl md:rounded-3xl outline-none text-base md:text-lg min-h-[120px] md:min-h-[140px] focus:ring-4 ring-indigo-50 transition-all"></textarea>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">বিষয় নির্বাচন করুন</label>
                            <select id="modal-subject" class="w-full p-4 md:p-5 bg-slate-50 border border-slate-100 rounded-2xl md:rounded-3xl outline-none font-bn focus:ring-4 ring-indigo-50 transition-all">
                                <option value="Math">গণিত (Math)</option>
                                <option value="Physics">পদার্থবিজ্ঞান (Physics)</option>
                                <option value="Chemistry">রসায়ন (Chemistry)</option>
                                <option value="Biology">জীববিজ্ঞান (Biology)</option>
                                <option value="Bangla">বাংলা (Bangla)</option>
                                <option value="English">ইংরেজি (English)</option>
                                <option value="ICT" selected>আইসিটি (ICT)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">কঠিনতা নির্বাচন করুন</label>
                            <div class="flex gap-2">
                                <button onclick="selectDifficulty('Easy')" id="diff-easy" class="flex-1 p-3 md:p-4 bg-emerald-50 border-2 border-emerald-200 rounded-xl md:rounded-2xl font-bold text-emerald-700 hover:bg-emerald-100 transition-all">সহজ (Easy)</button>
                                <button onclick="selectDifficulty('Medium')" id="diff-medium" class="flex-1 p-3 md:p-4 bg-yellow-50 border-2 border-yellow-200 rounded-xl md:rounded-2xl font-bold text-yellow-700 hover:bg-yellow-100 transition-all active">মাঝারি (Medium)</button>
                                <button onclick="selectDifficulty('Hard')" id="diff-hard" class="flex-1 p-3 md:p-4 bg-rose-50 border-2 border-rose-200 rounded-xl md:rounded-2xl font-bold text-rose-700 hover:bg-rose-100 transition-all">কঠিন (Hard)</button>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">পড়ার তারিখ</label>
                            <input id="modal-date" type="date" class="w-full p-4 md:p-5 bg-slate-50 border border-slate-100 rounded-2xl md:rounded-3xl outline-none font-mono focus:ring-4 ring-indigo-50 transition-all">
                        </div>
                        <button onclick="addTopicManual()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 md:py-5 rounded-2xl md:rounded-3xl font-black uppercase tracking-widest shadow-xl shadow-indigo-200 transition-all active:scale-95">ডেটা সিঙ্ক করুন</button>
                    </div>
                </div>
            </div>

            <!-- Review Rating Modal -->
            <div id="review-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-md z-[100] flex items-center justify-center p-3 md:p-4">
                <div class="bg-white w-full max-w-lg rounded-[1.5rem] md:rounded-[2.5rem] p-6 md:p-10 shadow-2xl font-bn border border-slate-100">
                    <div class="flex justify-between items-center mb-6 md:mb-8">
                        <div>
                            <h2 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">রিভিউ রেটিং দিন</h2>
                            <p class="text-xs md:text-sm text-slate-400 font-bold" id="review-topic-name">টপিক নাম</p>
                        </div>
                        <button onclick="closeReviewModal()" class="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-rose-500 transition-colors"><i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6"></i></button>
                    </div>
                    <div class="space-y-4 md:space-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">কঠিনতা নির্বাচন করুন (FSRS)</label>
                            <div class="flex gap-2">
                                <button onclick="selectReviewDifficulty('Easy')" id="review-diff-easy" class="flex-1 p-3 md:p-4 bg-emerald-50 border-2 border-emerald-200 rounded-xl md:rounded-2xl font-bold text-emerald-700 hover:bg-emerald-100 transition-all">সহজ<br/><span class="text-xs">(Easy)</span></button>
                                <button onclick="selectReviewDifficulty('Medium')" id="review-diff-medium" class="flex-1 p-3 md:p-4 bg-yellow-50 border-2 border-yellow-200 rounded-xl md:rounded-2xl font-bold text-yellow-700 hover:bg-yellow-100 transition-all">মাঝারি<br/><span class="text-xs">(Medium)</span></button>
                                <button onclick="selectReviewDifficulty('Hard')" id="review-diff-hard" class="flex-1 p-3 md:p-4 bg-rose-50 border-2 border-rose-200 rounded-xl md:rounded-2xl font-bold text-rose-700 hover:bg-rose-100 transition-all">কঠিন<br/><span class="text-xs">(Hard)</span></button>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">আত্মবিশ্বাস রেটিং (SM-2)</label>

            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = (event) => {
                const database = request.result;
                const oldVersion = event.oldVersion;
                
                // Create offline queue store
                if (!database.objectStoreNames.contains('offlineQueue')) {
                    const store = database.createObjectStore('offlineQueue', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('timestamp', 'timestamp', { unique: false });
                    store.createIndex('type', 'type', { unique: false });

                // Create offline topics store

                                const updateTransaction = db.transaction(['offlineQueue'], 'readwrite');

                            // Add to Firebase and track ID mapping

                                    const offlineTransaction = db.transaction(['offlineTopics'], 'readwrite');
                                    const offlineStore = offlineTransaction.objectStore('offlineTopics');
                                    offlineStore.delete(offlineId);
                                }
                            }
                            break;
                            
                        case 'updateTopic':
                            // Check if we need to use mapped ID
                            let updateId = item.data.id;
                            if (updateId && updateId.startsWith('offline_') && idMappings.has(updateId)) {
                                updateId = idMappings.get(updateId);
                            }

                            break;
                            
                        case 'deleteTopic':

                            let deleteId = item.data.id;
                            if (deleteId && deleteId.startsWith('offline_')) {
                                // Check if we have a Firebase ID mapping
                                if (idMappings.has(deleteId)) {
                                    deleteId = idMappings.get(deleteId);

                            } else {
                                // Normal Firebase item deletion
                                await database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${deleteId}`).remove();
                            }
                            break;
                            
                        case 'addLog':
                            await database.ref(`users/${currentUser.uid}/spacedRepetition/logs`).push().set(item.data);
                            break;
                    }
                    
                    // Mark as synced
                    const updateTransaction = db.transaction(['offlineQueue'], 'readwrite');
                    const updateStore = updateTransaction.objectStore('offlineQueue');
                    item.synced = true;
                    updateStore.put(item);

        // Sync notes from IndexedDB to Firebase

// ===== ALGORITHM MANAGER CLASS =====
class AlgorithmManager {
    constructor(algorithmType = 'FSRS') {
        this.algorithmType = algorithmType; // 'SM2' or 'FSRS'
    }

    // Initialize new topic parameters
    initializeTopic(difficulty) {
        if (this.algorithmType === 'SM2') {
            return { easeFactor: 2.5, revCount: 0 };
        } else {
            const stabilityMap = { Easy: 7, Medium: 3, Hard: 1 };
            return { 
                stability: stabilityMap[difficulty] || 3, 
                lastReviewTime: Date.now(),
                revCount: 0
            };
        }
    }

    // Calculate next review date
    calculateNextReview(topic, rating) {
        if (this.algorithmType === 'SM2') {
            return this.calculateSM2(topic, rating);
        } else {
            return this.calculateFSRS(topic, rating);
        }
    }

    calculateSM2(topic, confidenceRating) {
        // SM-2 implementation
        let newEF = (topic.easeFactor || 2.5) + (0.1 - (5 - confidenceRating) * (0.08 + (5 - confidenceRating) * 0.02));
        newEF = Math.max(1.3, newEF);

        let interval;
        if (confidenceRating < 3) {
            interval = 1; // Reset to 1 day for failed reviews
        } else if (topic.revCount === 0) {
            // First review: use the stored lastInterval and apply ease factor
            const baseInterval = topic.lastInterval || 1;
            interval = Math.round(baseInterval * newEF);
        } else if (topic.revCount === 1) {
            // Second review: use lastInterval * easeFactor, or default to 6
            const prevInterval = topic.lastInterval || 1;
            interval = Math.round(prevInterval * newEF);
            interval = Math.max(interval, 6); // Ensure at least 6 days for second review
        } else {
            // Subsequent reviews: multiply previous interval by ease factor
            const prevInterval = topic.lastInterval || 6;
            interval = Math.round(prevInterval * newEF);
        }

        return {
            easeFactor: newEF,
            nextDate: Date.now() + (interval * 86400000),
            revCount: confidenceRating >= 3 ? topic.revCount + 1 : 0,
            startTime: Date.now(),
            lastInterval: interval // Store this interval for next calculation
        };
    }

    calculateFSRS(topic, difficulty) {
        // FSRS implementation - Fixed formula
        const multiplierMap = { Easy: 1.5, Medium: 1.2, Hard: 0.8 };
        const newStability = (topic.stability || 3) * (multiplierMap[difficulty] || 1.2);

        // Correct FSRS formula: R = e^(ln(0.9) × t/S)
        // To find t when R drops to R_target:
        // R_target = e^(ln(0.9) × t/S)
        // ln(R_target) = ln(0.9) × t/S
        // t = S × ln(R_target) / ln(0.9)
        // 
        // Since ln(0.9) ≈ -0.105 and ln(0.9) ≈ -0.105, they're both negative
        // So: t = S × (-0.105) / (-0.105) = S (when R_target = 0.9)
        const R_target = 0.9; // We want 90% retrievability at next review
        const intervalDays = Math.round(newStability * Math.log(R_target) / Math.log(0.9));

        return {
            stability: newStability,
            lastReviewTime: Date.now(),
            nextDate: Date.now() + (intervalDays * 86400000),
            revCount: topic.revCount + 1,
            startTime: Date.now(),
            lastInterval: intervalDays // Store this interval for consistency
        };
    }

    // Calculate current retrievability
    calculateRetrievability(topic) {
        if (this.algorithmType !== 'FSRS' || !topic.stability) return null;

        // For topics that have never been reviewed, calculate from when they were created/read
        // For reviewed topics, calculate from last review time
        const referenceTime = (topic.revCount === 0) ? (topic.createdAt || topic.startTime) : topic.lastReviewTime;
        
        if (!referenceTime) return null;

        const elapsedDays = (Date.now() - referenceTime) / 86400000;
        const R = Math.exp((Math.log(0.9) * elapsedDays) / topic.stability);
        return Math.max(0, Math.min(100, Math.round(R * 100)));
    }
}

class SubjectFilterManager {
    constructor() {
        this.subjects = ['Math', 'Physics', 'Chemistry', 'Biology', 'Bangla', 'English', 'ICT'];
        this.currentSubject = localStorage.getItem('selectedSubject') || 'All';
        this.subjectCache = {}; // Cache loaded topics per subject
        this.subjectLoadedCount = {}; // Track how many topics loaded per subject
        this.subjectHasMore = {}; // Track if more topics available per subject
        this.isLoading = false; // Loading state
    }

    setSubject(subject) {
        this.currentSubject = subject;
        localStorage.setItem('selectedSubject', subject);
        currentSubject = subject; // Update global variable
    }

    getSubject() {
        return this.currentSubject;
    }

    async loadTopicsForSubject(subject, limit = 50, loadMore = false) {
        if (!currentUser || this.isLoading) return [];

        this.isLoading = true;

        try {
            if (subject === 'All') {
                return await this._loadAllTopics(limit, loadMore);
            }

            // If not loading more and we have cached data, return it
            if (!loadMore && this.subjectCache[subject]) {
                this.isLoading = false;
                return this.subjectCache[subject];
            }

            // Initialize tracking for this subject if needed
            if (!this.subjectLoadedCount[subject]) {
                this.subjectLoadedCount[subject] = 0;
            }

            // Query Firebase with pagination
            let query = database.ref(`users/${currentUser.uid}/spacedRepetition/topics`)
                .orderByChild('subject')
                .equalTo(subject)
                .limitToFirst(limit + 1); // Load one extra to check if more exist

            const snapshot = await query.once('value');
            const topicsData = [];
            snapshot.forEach(child => {
                topicsData.push({ id: child.key, ...child.val() });
            });

            // Check if more topics exist
            const hasMore = topicsData.length > limit;
            if (hasMore) {
                topicsData.pop(); // Remove the extra item
            }

            this.subjectHasMore[subject] = hasMore;

            if (loadMore && this.subjectCache[subject]) {
                // Append new topics to existing cache
                const existingIds = new Set(this.subjectCache[subject].map(t => t.id));
                const newTopics = topicsData.filter(t => !existingIds.has(t.id));
                this.subjectCache[subject] = [...this.subjectCache[subject], ...newTopics];
            } else {
                // Initial load - cache results
                this.subjectCache[subject] = topicsData;
            }

            this.subjectLoadedCount[subject] = this.subjectCache[subject].length;

            this.isLoading = false;
            return this.subjectCache[subject];
        } catch (error) {
            console.error('Error loading topics for subject:', error);
            this.isLoading = false;
            return this.subjectCache[subject] || [];
        }
    }

    async _loadAllTopics(limit, loadMore) {
        if (!currentUser) return [];

        // For "All" subjects, use the existing global topics array
        // This maintains backward compatibility with the current implementation
        return topics;
    }

    hasMoreTopics(subject) {
        return this.subjectHasMore[subject] || false;
    }

    getLoadedCount(subject) {
        return this.subjectLoadedCount[subject] || 0;
    }

    clearCache() {
        this.subjectCache = {};
        this.subjectLoadedCount = {};
        this.subjectHasMore = {};
        console.log('Subject filter cache cleared');
    }

    clearSubjectCache(subject) {
        delete this.subjectCache[subject];
        delete this.subjectLoadedCount[subject];
        delete this.subjectHasMore[subject];
    }
}

// ===== MIGRATION MANAGER CLASS =====
class MigrationManager {
    async migrateExistingTopics(topicsArray) {
        const migratedTopics = [];

        for (const topic of topicsArray) {
            const migrated = { ...topic };

            // Add subject if missing
            if (!migrated.subject) {
                migrated.subject = 'ICT'; // Default category
                migrated.needsSubjectUpdate = true;
            }

            // Add SM-2 parameters if missing
            if (migrated.easeFactor === undefined) {
                migrated.easeFactor = 2.5;
            }

            // Add FSRS parameters if missing
            if (migrated.stability === undefined) {
                // Derive stability from existing interval
                const intervalDays = (migrated.nextDate - migrated.startTime) / 86400000;
                migrated.stability = Math.max(1, intervalDays);
                migrated.lastReviewTime = migrated.startTime;
            }

            // Initialize review history if missing
            if (!migrated.reviewHistory) {
                migrated.reviewHistory = [];
            }

            migratedTopics.push(migrated);
        }

        return migratedTopics;
    }

    async saveMigratedTopics(topicsArray) {
        if (!currentUser) return;

        const updates = {};
        for (const topic of topicsArray) {
            if (topic.id && !topic.id.startsWith('offline_')) {
                updates[`users/${currentUser.uid}/spacedRepetition/topics/${topic.id}`] = topic;
            }

function initializeFirebaseListeners(uid) {
    console.log('Initializing Firebase listeners for user:', uid);
    
    // Use limitToLast for pagination - load most recent topics first
    topicsListener = database.ref(`users/${uid}/spacedRepetition/topics`)
        .orderByChild('createdAt')
        .limitToLast(topicsPageSize)
        .on('value', async (snapshot) => {
            const data = snapshot.val();
            let loadedTopics = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => b.createdAt - a.createdAt) : [];
            
            // Only run migration if topics actually need it (not already migrated)
            const needsMigration = loadedTopics.some(t => !t.subject || t.easeFactor === undefined || t.stability === undefined);
            if (needsMigration) {
                console.log('Running migration on loaded topics');
                loadedTopics = await migrationManager.migrateExistingTopics(loadedTopics);
                await migrationManager.saveMigratedTopics(loadedTopics);
            }
            
            topics = loadedTopics;
            
            // Check if we've loaded all topics
            allTopicsLoaded = topics.length < topicsPageSize;
            
            render();
            updateSidebarStats();
        });

    logsListener = database.ref(`users/${uid}/spacedRepetition/logs`)
        .orderByChild('timestamp')
        .limitToLast(logsLoadedCount)
        .on('value', (snapshot) => {
            const data = snapshot.val();
            logs = data ? Object.keys(data)
                .map(key => ({ id: key, ...data[key] }))
                .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))

function migrateLocalStorageToFirebase(uid) {

    const localLogs = JSON.parse(localStorage.getItem('ss_ultra_logs')) || [];

        function calculateMetrics(topic) {
            const now = Date.now();
            const elapsedMs = now - topic.startTime;
            const elapsedHours = elapsedMs / 3600000;
            const gapIndex = Math.min(topic.revCount, SCIENTIFIC_GAPS.length - 1);
            const currentGapDays = SCIENTIFIC_GAPS[gapIndex] || (topic.revCount * 30);
            const nextGapDays = SCIENTIFIC_GAPS[gapIndex + 1] || (currentGapDays + 30);
            const totalCycleMs = nextGapDays * 86400000;
            const remainingMs = topic.nextDate - now;

            // Calculate Retrievability using AlgorithmManager
            let retrievability = algorithmManager.calculateRetrievability(topic);
            if (retrievability === null) {
                // Fallback calculation if FSRS data not available
                if (topic.stability && topic.lastReviewTime) {
                    const elapsedDays = (now - topic.lastReviewTime) / 86400000;
                    const R = Math.exp((Math.log(0.9) * elapsedDays) / topic.stability);
                    retrievability = Math.max(0, Math.min(100, Math.round(R * 100)));
                } else {
                    retrievability = 100;
                }
            }

            const baseRetention = 80 + (topic.revCount * 4);
            const stabilityFactor = Math.max(24, currentGapDays * 24 * (1 + topic.revCount * 0.5));
            const currentRetention = baseRetention * Math.exp(-elapsedHours / stabilityFactor);
            const brainSave = Math.max(5, Math.min(100, Math.round(currentRetention)));

            // Fixed battery calculation - based on actual interval from last review
            let battery = 100;
            if (remainingMs <= 0) {
                // Overdue - battery should be 0
                battery = 0;
            } else {
                // Calculate total interval: from startTime (last review) to nextDate
                const totalIntervalMs = topic.nextDate - topic.startTime;
                
                // Calculate elapsed time since last review
                const elapsedSinceReview = now - topic.startTime;
                
                // Battery = remaining time / total interval
                // This way battery starts at 100% after review and decreases to 0% at nextDate
                battery = Math.round((remainingMs / totalIntervalMs) * 100);
                battery = Math.max(0, Math.min(100, battery));
            }

            // Color coding for battery bar (time-based)
            let color = 'bg-emerald-500';
            if (battery <= 0) { 
                color = 'bg-rose-500'; 
            } else if (battery < 25) { 
                color = 'bg-red-500'; 
            } else if (battery < 50) { 
                color = 'bg-orange-500'; 
            } else if (battery < 75) { 
                color = 'bg-yellow-500'; 
            }
            
            // Color coding for retrievability percentage (memory strength)
            let textColor = 'text-emerald-600';
            let circleBgColor = 'bg-emerald-50';
            let circleBorderColor = 'border-emerald-200';
            
            if (retrievability <= 10) { 
                textColor = 'text-rose-600'; 
                circleBgColor = 'bg-rose-50';
                circleBorderColor = 'border-rose-200';
            } else if (retrievability < 30) { 
                textColor = 'text-red-600'; 
                circleBgColor = 'bg-red-50';
                circleBorderColor = 'border-red-200';
            } else if (retrievability < 50) { 
                textColor = 'text-orange-600'; 
                circleBgColor = 'bg-orange-50';
                circleBorderColor = 'border-orange-200';
            } else if (retrievability < 70) { 
                textColor = 'text-yellow-600'; 
                circleBgColor = 'bg-yellow-50';
                circleBorderColor = 'border-yellow-200';
            }

            let timerStr = "এখনই রিভাইজ দিন";
            if (remainingMs > 0) {
                const h = Math.floor(remainingMs / 3600000);
                const m = Math.floor((remainingMs % 3600000) / 60000);
                timerStr = `${h}ঘণ্টা ${m}মিনিট পর`;
            }

            return {
                battery, 
                retrievability,
                color, 
                textColor,
                circleBgColor,
                circleBorderColor,
                brainSave, 
                isDue: now >= topic.nextDate || retrievability < 10,
                timerStr,
                addedStr: new Date(topic.createdAt).toLocaleDateString('bn-BD'),
                nextDateStr: new Date(topic.nextDate).toLocaleDateString('bn-BD', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                })
            };
        }

      function addTopic(name, customDate = null, subject = 'ICT', difficulty = 'Medium') {
    if (!name.trim()) return;
    
    const createdAt = customDate ? new Date(customDate).getTime() : Date.now();
    
    console.log('=== ADD TOPIC DEBUG START ===');
    console.log('Input:', {
        name: name.trim(),
        customDate: customDate,
        createdAt: new Date(createdAt).toLocaleString(),
        difficulty: difficulty,
        now: new Date(Date.now()).toLocaleString()
    });
    
    // Initialize topic parameters using AlgorithmManager
    const algorithmParams = algorithmManager.initializeTopic(difficulty);
    
    // Calculate initial interval based on stability (FSRS approach)
    const stabilityMap = { Easy: 7, Medium: 3, Hard: 1 };
    const initialStability = stabilityMap[difficulty] || 3;
    const initialInterval = initialStability; // First review should be after stability days
    
    // Calculate nextDate from createdAt (when you first read it)
    let nextDate = createdAt + (initialInterval * 86400000);
    
    console.log('Initial calculation:', {
        initialStability: initialStability,
        initialInterval: initialInterval + ' days',
        nextDateFromCreatedAt: new Date(nextDate).toLocaleString(),
        isInPast: nextDate < Date.now(),
        daysOverdue: nextDate < Date.now() ? ((Date.now() - nextDate) / 86400000).toFixed(1) : 0
    });
    
    // DON'T recalculate if in the past - this preserves the natural review schedule
    // The topic is simply overdue and should be reviewed now
    // The UI will show it as overdue with low retrievability
    
    const topicData = {
        name: name.trim(),
        subject: subject,
        difficulty: difficulty, // Store difficulty field
        revCount: algorithmParams.revCount || 0,
        startTime: createdAt,
        nextDate: nextDate, // Keep the original schedule, even if in the past
        createdAt: createdAt,
        easeFactor: algorithmParams.easeFactor || 2.5,
        stability: algorithmParams.stability || 3,
        lastReviewTime: algorithmParams.lastReviewTime || createdAt,
        lastInterval: initialInterval, // Store initial interval
        reviewHistory: []
    };
    
    console.log('Final topicData:', {
        startTime: new Date(topicData.startTime).toLocaleString(),
        nextDate: new Date(topicData.nextDate).toLocaleString(),
        isOverdue: topicData.nextDate < Date.now(),
        daysOverdue: topicData.nextDate < Date.now() ? ((Date.now() - topicData.nextDate) / 86400000).toFixed(1) : 0,
        stability: topicData.stability,
        easeFactor: topicData.easeFactor,
        lastInterval: topicData.lastInterval,
        revCount: topicData.revCount
    });
    console.log('=== ADD TOPIC DEBUG END ===');

    if (currentUser && isOnline) {
        // Online: Save to Firebase
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics`).push().set(topicData)
            .then(() => addLog(name, "নতুন রেকর্ড যোগ করা হয়েছে", "added"))
            .catch((error) => {
                console.error("Error:", error);
                // If Firebase fails, save offline

                addTopicOffline(topicData);
                showNotification('অফলাইন সেভ', 'টপিক অফলাইনে সেভ হয়েছে');

    }

     function deleteTopic(id) {

    const topic = topics.find(t => t.id === id);
    if (!topic || !confirm(`"${topic.name}" মুছে ফেলতে চান?`)) return;

    if (isOnline) {
        // Online: Delete from Firebase directly
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${id}`).remove()

                showNotification('ত্রুটি', 'টপিক মুছতে ব্যর্থ হয়েছে');
            });
    } else {
        // Offline: Queue for later sync
        if (db) {
            const transaction = db.transaction(['offlineQueue'], 'readwrite');
            const store = transaction.objectStore('offlineQueue');
            store.add({
                action: 'deleteTopic',
                data: { id: id },
                timestamp: Date.now(),
                synced: false
            });
        }
        
        // Remove from local array
        topics = topics.filter(t => t.id !== id);
        
        // Remove from IndexedDB if it's an offline topic
        if (id.startsWith('offline_') && db) {
            const transaction = db.transaction(['offlineTopics'], 'readwrite');
            const store = transaction.objectStore('offlineTopics');
            store.delete(id);
        }
        
        addLog(topic.name, "রেকর্ড মুছে ফেলা হয়েছে (অফলাইন)", "deleted");

            const subjectTopics = await subjectFilterManager.loadTopicsForSubject(subject, 50, false);

            // This maintains compatibility with the existing render logic
            if (subjectTopics.length > 0) {
                // Merge with existing topics, avoiding duplicates
                const existingIds = new Set(topics.map(t => t.id));

    }
    
    render();

function submitReview() {
    if (!currentReviewTopicId) return;
    
    const topic = topics.find(t => t.id === currentReviewTopicId);
    if (!topic) return;
    
    console.log('=== REVIEW DEBUG START ===');
    console.log('Topic before review:', {
        name: topic.name,
        revCount: topic.revCount,
        stability: topic.stability,
        easeFactor: topic.easeFactor,
        lastInterval: topic.lastInterval,
        startTime: new Date(topic.startTime).toLocaleString(),
        nextDate: new Date(topic.nextDate).toLocaleString()
    });
    
    // DUAL ALGORITHM APPROACH: Use BOTH algorithms together
    // FSRS handles stability and retrievability
    // SM-2 handles ease factor and confidence
    
    // Calculate FSRS updates (stability-based)
    const fsrsUpdates = algorithmManager.calculateFSRS(topic, selectedReviewDifficulty);
    console.log('FSRS Updates:', {
        difficulty: selectedReviewDifficulty,
        newStability: fsrsUpdates.stability,
        nextDate: new Date(fsrsUpdates.nextDate).toLocaleString(),
        intervalDays: ((fsrsUpdates.nextDate - Date.now()) / 86400000).toFixed(2)
    });
    
    // Calculate SM-2 updates (confidence-based)
    const sm2Updates = algorithmManager.calculateSM2(topic, selectedConfidenceRating);
    console.log('SM-2 Updates:', {
        confidence: selectedConfidenceRating,
        newEF: sm2Updates.easeFactor,
        nextDate: new Date(sm2Updates.nextDate).toLocaleString(),
        intervalDays: ((sm2Updates.nextDate - Date.now()) / 86400000).toFixed(2)
    });
    
    // Combine both: Use FSRS for nextDate and stability, SM-2 for ease factor
    // The final nextDate should be based on BOTH algorithms
    // Take the average of both intervals for balanced scheduling
    const fsrsInterval = (fsrsUpdates.nextDate - Date.now()) / 86400000;
    const sm2Interval = (sm2Updates.nextDate - Date.now()) / 86400000;
    const combinedInterval = Math.round((fsrsInterval + sm2Interval) / 2);
    
    console.log('Combined Calculation:', {
        fsrsInterval: fsrsInterval.toFixed(2) + ' days',
        sm2Interval: sm2Interval.toFixed(2) + ' days',
        combinedInterval: combinedInterval + ' days',
        finalNextDate: new Date(Date.now() + (combinedInterval * 86400000)).toLocaleString()
    });
    
    const updates = {
        // FSRS properties
        stability: fsrsUpdates.stability,
        lastReviewTime: Date.now(),
        // SM-2 properties
        easeFactor: sm2Updates.easeFactor,
        // Combined scheduling
        nextDate: Date.now() + (combinedInterval * 86400000),
        revCount: topic.revCount + 1,
        startTime: Date.now(),
        // Store the combined interval for next SM-2 calculation
        lastInterval: combinedInterval
    };
    
    console.log('Final Updates:', {
        stability: updates.stability,
        easeFactor: updates.easeFactor,
        revCount: updates.revCount,
        lastInterval: updates.lastInterval,
        startTime: new Date(updates.startTime).toLocaleString(),
        nextDate: new Date(updates.nextDate).toLocaleString()
    });
    console.log('=== REVIEW DEBUG END ===');
    
    // Add review history entry
    const reviewEntry = {
        timestamp: Date.now(),
        confidenceRating: selectedConfidenceRating,
        difficulty: selectedReviewDifficulty,
        easeFactor: updates.easeFactor,
        stability: updates.stability,
        retrievability: algorithmManager.calculateRetrievability(topic) || 100,
        fsrsInterval: Math.round(fsrsInterval),
        sm2Interval: Math.round(sm2Interval),
        combinedInterval: combinedInterval
    };
    
    const reviewHistory = topic.reviewHistory || [];
    reviewHistory.push(reviewEntry);
    if (reviewHistory.length > 20) {
        reviewHistory.shift(); // Keep only last 20
    }
    
    updates.reviewHistory = reviewHistory;
    
    if (currentUser && isOnline) {
        // Online: Update Firebase
        database.ref(`users/${currentUser.uid}/spacedRepetition/topics/${currentReviewTopicId}`).update(updates)
            .then(() => addLog(topic.name, "রিভিশন সম্পন্ন হয়েছে", "revised"))
            .catch((error) => {
                console.error("Error:", error);
                // If Firebase fails, save offline
                saveToOfflineQueue('updateTopic', { id: currentReviewTopicId, updates: updates });
                updateTopicOffline(currentReviewTopicId, updates);
            });
    } else {
        // Offline: Update locally
        updateTopicOffline(currentReviewTopicId, updates);
        saveToOfflineQueue('updateTopic', { id: currentReviewTopicId, updates: updates });
        addLogOffline(topic.name, "রিভিশন সম্পন্ন হয়েছে", "revised");
        showNotification('অফলাইন রিভিউ', 'রিভিশন অফলাইনে সেভ হয়েছে');
    }
    
    closeReviewModal();
}

                    const data = snapshot.val();
                    
                    if (data) {

                    }
                } else {

                    if (offlineNotes) {
                        notesContent = offlineNotes.content || '';
                        notesLastSaved = offlineNotes.lastModified || null;
                    }
                }
            } catch (error) {
                console.error('Error loading notes:', error);
            }

        function saveNotesOffline(notesData) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('IndexedDB not initialized'));
                    return;
                }
                
                const transaction = db.transaction(['offlineNotes'], 'readwrite');
                const store = transaction.objectStore('offlineNotes');
                
                // Use fixed key for notes
                const request = store.put({ id: 'user_notes', ...notesData });
                
                request.onsuccess = () => {
                    // Queue for sync
                    saveToOfflineQueue('saveNotes', notesData);
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        function loadNotesOffline() {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve(null);
                    return;
                }
                
                const transaction = db.transaction(['offlineNotes'], 'readonly');
                const store = transaction.objectStore('offlineNotes');
                const request = store.get('user_notes');
                
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function renderCharts() {
            const ctx1 = document.getElementById('retentionChart')?.getContext('2d');
            const ctx2 = document.getElementById('activityChart')?.getContext('2d');
            if (!ctx1 || !ctx2) return;

            // Prevent "Canvas is already in use" errors when re-rendering analytics.
            if (retentionChartInstance) {
                retentionChartInstance.destroy();
                retentionChartInstance = null;
            }
            if (activityChartInstance) {
                activityChartInstance.destroy();
                activityChartInstance = null;
            }

            // Limit chart data to last 100 topics for performance with large datasets
            const sorted = [...topics].sort((a,b) => a.createdAt - b.createdAt).slice(-100);
            const labels = sorted.map(t => t.name.length > 12 ? t.name.substring(0, 12) + '..' : t.name);
            
            // Calculate dynamic width: minimum 50px per topic, minimum container width 600px
            const minWidth = Math.max(600, sorted.length * 50);
            
            // Set canvas parent width
            const container1 = ctx1.canvas.parentElement;
            const container2 = ctx2.canvas.parentElement;
            container1.style.width = `${minWidth}px`;
            container2.style.width = `${minWidth}px`;
            container1.style.height = '300px';
            container2.style.height = '300px';
            
            // Retention Chart
            retentionChartInstance = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Retention %',
                        data: sorted.map(t => calculateMetrics(t).brainSave),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',

                    maintainAspectRatio: false,

                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: function(context) {
                                    return sorted[context[0].dataIndex].name;
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { min: 0, max: 100, grid: { display: false } }, 
                        x: { 
                            grid: { display: false },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        } 
                    }
                }
            });

            // Activity Chart
            activityChartInstance = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Revision Count',
                        data: sorted.map(t => t.revCount),

                        y: { beginAtZero: true, grid: { display: false } }, 
                        x: { 
                            grid: { display: false },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        } 
                    }
                }
            });
        }

 "তুমি তোমার রবের ফয়সালার অপেক্ষায় ধৈর্য ধারণ করো, নিশ্চয়ই তুমি আমার চোখের সামনেই আছো। (সুরা তুর: ৪৮)",
 "আল্লাহ আমাদের ভাগ্যে যা লিখে রেখেছেন তা ছাড়া আর কিছুই আমাদের ওপর আপতিত হবে না। (সুরা তাওবা: ৫১)",
 "তোমরা আমাকে ডাকো, আমি তোমাদের ডাকে সাড়া দেব। (সুরা গাফির: ৬০)",
 "আল্লাহর রহমত থেকে নিরাশ হয়ো না। নিশ্চয়ই আল্লাহ সমস্ত গুনাহ ক্ষমা করে দেন। (সুরা যুমার: ৫৩)",
 "তিনিই মৃত্যু ও জীবন সৃষ্টি করেছেন যাতে তোমাদের পরীক্ষা করতে পারেন। (সুরা মুলক: ২)",
"পৃথিবীর কোনো বিচরণশীল প্রাণী নেই যার রিযিকের দায়িত্ব আল্লাহর ওপর নেই। (সুরা হুদ: ৬)",
 "হে মানুষ! তুমি তোমার রবের কাছে পৌঁছানো পর্যন্ত কঠোর পরিশ্রম করতে থাকো। (সুরা ইনশিকাক: ৬)",
"যদি আল্লাহ তোমাদের সাহায্য করেন, তবে তোমাদের ওপর জয়ী হওয়ার কেউ নেই। (সুরা আল-ইমরান: ১৬০)",
 "নিশ্চয়ই আল্লাহ তাওবাকারীদের ভালোবাসেন। (সুরা বাকারা: ২২২)",
"আর তোমাদের রব অত্যন্ত ক্ষমাশীল, দয়ার আধার। (সুরা কাহাফ: ৫৮)",
"হে প্রশান্ত আত্মা! তুমি তোমার রবের কাছে ফিরে এসো সন্তুষ্ট হয়ে। (সুরা ফাজর: ২৭-২৮)",
 "তোমরা আমাকে স্মরণ করো, আমিও তোমাদের স্মরণ করব। (সুরা বাকারা: ১৫২)",
"যে সৎকাজ করবে, আমি তাকে পবিত্র জীবন দান করব। (সুরা নাহল: ৯৭)",
            "যে আল্লাহর ওপর ভরসা করে, তার জন্য তিনিই যথেষ্ট। (সুরা তালাক: ৩)"        
        ];

        // গ্লোবাল ট্র্যাকার
        const occupiedLanes = new Array(12).fill(false);
        let activeNotesCount = 0; // স্ক্রিনে বর্তমানে কয়টি নোট আছে তা ট্র্যাক করবে

        const FloatingNote = ({ text, index }) => {
            const noteRef = useRef(null);

            useEffect(() => {
                const element = noteRef.current;
                if (!element) return;

                let currentLane = -1;
                let isNoteActive = false;

                const startFloating = () => {
                    // ১. স্ক্রিনে 3টির বেশি নোট থাকলে ওয়েট করবে
                    if (activeNotesCount >= 3) {
                        setTimeout(startFloating, 2000 + Math.random() * 3000); // ২-৫ সেকেন্ড পর আবার চেক করবে
                        return;
                    }

                    // ২. খালি গলি খোঁজা
                    const availableLanes = occupiedLanes
                        .map((occ, i) => occ ? null : i)
                        .filter(i => i !== null);
                    
                    if (availableLanes.length === 0) {
                        setTimeout(startFloating, 1000);
                        return;
                    }

                    // ৩. নোট একটিভ করা এবং লেন দখল করা
                    const randomIdx = Math.floor(Math.random() * availableLanes.length);
                    currentLane = availableLanes[randomIdx];
                    occupiedLanes[currentLane] = true;
                    activeNotesCount++;
                    isNoteActive = true;

                    // ৪. স্টাইল এবং পজিশন (গ্যাপ বাড়ানোর জন্য translateX এর শুরুটা দূরে রাখা হয়েছে)
                    const topPos = 12 + (currentLane * 7); 
                    element.style.top = `${topPos}%`;
                    element.style.visibility = 'visible';

                    // ৫. র্যান্ডম স্পিড
                    const duration = Math.floor(Math.random() * 40000) + 60000; // ২০-৩০ সেকেন্ড

                    const animation = element.animate([
                        { transform: 'translateX(120vw)' }, // স্ক্রিনের অনেক বাইরে থেকে শুরু
                        { transform: 'translateX(-180vw)' } // স্ক্রিন পুরোপুরি পার হওয়া
                    ], {
                        duration: duration,
                        easing: 'linear',
                        delay: 0 
                    });

                    animation.onfinish = () => {
                        // ৬. রিসেট লজিক: স্ক্রিন পার হলে লেন এবং কাউন্ট খালি করে দেওয়া
                        if (currentLane !== -1) occupiedLanes[currentLane] = false;
                        if (isNoteActive) {
                            activeNotesCount--;
                            isNoteActive = false;
                        }
                        element.style.visibility = 'hidden';
                        
                        // নতুন সাইকেল শুরুর আগে র্যান্ডম গ্যাপ দেওয়া
                        setTimeout(startFloating, 1000 + Math.random() * 5000);
                    };
                };

                // শুরুতে সব নোট ইনভিজিবল থাকবে
                element.style.visibility = 'hidden';
                
                // প্রথমবার একেকটি নোট একেক সময় ট্রাই করা শুরু করবে যাতে শুরুতে ধাক্কা না লাগে
                const initialStartTimeout = setTimeout(startFloating, index * 3000);

                return () => {
                    clearTimeout(initialStartTimeout);
                    if (currentLane !== -1) occupiedLanes[currentLane] = false;
                    if (isNoteActive) activeNotesCount--;
                    if (element) {
                        element.getAnimations().forEach(anim => anim.cancel());
                    }
                };
            }, [index]);

            return (
                <div 
                    ref={noteRef}
                    className="fixed z-[9999] whitespace-nowrap pointer-events-none text-red-500/90 font-black italic select-none glow-text"
                    style={{ left: 0, willChange: 'transform', visibility: 'hidden' }}
                >
                    * {text}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [showMeaning, setShowMeaning] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {

            const [history, setHistory] = useState([]);
            const [notes, setNotes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newNote, setNewNote] = useState("");
            const [showCalendar, setShowCalendar] = useState(false);
            const [showFullHistory, setShowFullHistory] = useState(false);
            const [showNoteModal, setShowNoteModal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [isAlarmPlaying, setIsAlarmPlaying] = useState(false);
            const alarmInterval = useRef(null);

            const stopAlarm = () => {
                if (alarmInterval.current) {
                    clearInterval(alarmInterval.current);
                    alarmInterval.current = null;
                }
                setIsAlarmPlaying(false);
                setTimerSeconds(0);
                setActiveTimer(null);
            };

            const [timers, setTimers] = useState([]);
            const [activeTimer, setActiveTimer] = useState(null);
            const [timerSeconds, setTimerSeconds] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const timerRef = useRef(null);
            const audioCtx = useRef(null);

            const playBeep = () => {
                try {
                    console.log('Playing beep...'); // Debug log
                    
                    if (!audioCtx.current) {
                        audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                        console.log('Audio context created');
                    }
                    
                    // Resume audio context if suspended (required by browsers)
                    if (audioCtx.current.state === 'suspended') {
                        audioCtx.current.resume().then(() => {
                            console.log('Audio context resumed');
                        });
                    }
                    
                    console.log('Audio context state:', audioCtx.current.state);
                    
                    const oscillator = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    oscillator.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    
                    // Use square wave for louder, more noticeable sound
                    oscillator.type = "square";
                    oscillator.frequency.value = 600; // Lower frequency, easier to hear
                    
                    // Much louder volume - start at 0.8 (80%)
                    const now = audioCtx.current.currentTime;
                    gain.gain.setValueAtTime(0.8, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    
                    oscillator.start(now);
                    oscillator.stop(now + 0.3);
                    
                    console.log('Beep played successfully at volume 0.9');
                } catch (error) {
                    console.error('Audio playback error:', error);
                }
            };

            const [hscTarget, setHscTarget] = useState('2026-06-30');
            const [buetTarget, setBuetTarget] = useState('2026-10-15');
            const [timeLeft, setTimeLeft] = useState({ hsc: { d: 0, h: 0 }, buet: { d: 0, h: 0 } });

            const todayIndex = useMemo(() => {
                const today = new Date();
                return (today.getFullYear() * 100) + (today.getMonth() + 1) + today.getDate();
            }, []);

            const quote = useMemo(() => MOTIVATIONAL_QUOTES[todayIndex % MOTIVATIONAL_QUOTES.length], [todayIndex]);
            const randomAyat = useMemo(() => QURAN_AYATS[todayIndex % QURAN_AYATS.length], [todayIndex]);

            const handleGoogleLogin = async () => {
                try { await auth.signInWithPopup(googleProvider); } catch (err) { console.error("Login Error:", err); }
            };

            const handleLogout = () => auth.signOut();

            useEffect(() => {
                let activeRefs = [];
                const detachRealtimeListeners = () => {
                    activeRefs.forEach(ref => ref.off());
                    activeRefs = [];
                };

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    detachRealtimeListeners();

                    if (u) {
                        console.log('Reality Tracking: User logged in:', u.uid);
                        setLoading(true);
                        setUser(u);
                        
                        // Clear existing data before loading new user's data
                        setHistory([]);
                        setNotes([]);
                        setTimers([]);
                        
                        const historyRef = database.ref(`users/${u.uid}/history`);
                        const notesRef = database.ref(`users/${u.uid}/notes`);
                        const settingsRef = database.ref(`users/${u.uid}/settings`);
                        const timersRef = database.ref(`users/${u.uid}/timers`);
                        activeRefs = [historyRef, notesRef, settingsRef, timersRef];

                        historyRef.on('value', (snap) => {
                            const val = snap.val();
                            setHistory(val ? Object.keys(val).map(k => ({ id: k, ...val[k] })).sort((a,b) => b.id.localeCompare(a.id)) : []);
                            setLoading(false);
                        });
                        notesRef.on('value', (snap) => {
                            const val = snap.val();
                            setNotes(val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : []);
                        });
                        settingsRef.on('value', (snap) => {
                            const val = snap.val();
                            if(val) {
                                if(val.hsc) setHscTarget(val.hsc);
                                if(val.buet) setBuetTarget(val.buet);
                            }
                        });
                        timersRef.on('value', (snap) => {
                            const val = snap.val();
                            setTimers(val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : []);
                        });
                    } else {
                        console.log('Reality Tracking: User logged out');
                        setUser(null);
                        setHistory([]);
                        setNotes([]);
                        setTimers([]);
                        setLoading(false);
                    }
                });
                return () => {
                    detachRealtimeListeners();
                    unsubscribe();
                };
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                let interval;
                if (isTimerRunning && timerSeconds > 0) {
                    interval = setInterval(() => setTimerSeconds(prev => prev - 1), 1000);
                } else if (timerSeconds === 0 && isTimerRunning) {
                    setIsTimerRunning(false);
                    setIsAlarmPlaying(true); 
                    
                    // Play initial beep immediately
                    playBeep();
                    
                    // Then continue beeping every second
                    if (!alarmInterval.current) {
                        alarmInterval.current = setInterval(() => {
                            playBeep();
                        }, 1000);
                    }
                }
                return () => clearInterval(interval);
            }, [isTimerRunning, timerSeconds]);

            useEffect(() => {
                const calculateTime = () => {
                    const now = new Date().getTime();
                    
                    const hscDiff = new Date(hscTarget).getTime() - now;
                    const buetDiff = new Date(buetTarget).getTime() - now;

                    setTimeLeft({
                        hsc: {
                            d: Math.max(0, Math.floor(hscDiff / (1000 * 60 * 60 * 24))),
                            h: Math.max(0, Math.floor((hscDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)))
                        },
                        buet: {
                            d: Math.max(0, Math.floor(buetDiff / (1000 * 60 * 60 * 24))),
                            h: Math.max(0, Math.floor((buetDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)))
                        }
                    });
                };

                calculateTime();
                const timer = setInterval(calculateTime, 1000 * 60);
                return () => clearInterval(timer);
            }, [hscTarget, buetTarget]);

            const startTimer = (t) => {
                console.log('Starting timer:', t.label); // Debug log
                
                // Initialize audio context on user interaction (required by browsers)
                if (!audioCtx.current) {
                    audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                    console.log('Audio context created on timer start');
                }
                if (audioCtx.current.state === 'suspended') {
                    audioCtx.current.resume().then(() => {
                        console.log('Audio context resumed on timer start');
                    });
                }
                
                // Test beep to ensure audio is working
                playBeep();
                
                setActiveTimer(t);
                setTimerSeconds(t.minutes * 60);
                setIsTimerRunning(true);
            };

            const addCustomTimer = () => {
                const label = prompt("টাইমারের নাম:");
                const mins = parseInt(prompt("কত মিনিট?"));
                if (label && mins) {
                    database.ref(`users/${user.uid}/timers`).push().set({ label, minutes: mins });
                }
            };

            const deleteTimer = (e, id) => {
                e.stopPropagation();
                if(confirm("টাইমারটি মুছে ফেলতে চান?")) {
                    database.ref(`users/${user.uid}/timers/${id}`).remove();
                    if (activeTimer?.id === id) {
                        setActiveTimer(null);
                        setIsTimerRunning(false);
                        setTimerSeconds(0);
                    }
                }
            };

            const formatTime = (sec) => {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const last7DaysGraph = useMemo(() => {
                const days = [];
                for(let i=6; i>=0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const id = d.toISOString().split('T')[0];
                    const found = history.find(h => h.id === id);
                    days.push({ 
                        label: d.toLocaleDateString('bn-BD', {weekday: 'short'}),
                        date: d.getDate(),
                        status: found ? found.status : 'none'
                    });
                }
                return days;
            }, [history]);

            const updateSettings = () => {
                if(!user) return;
                database.ref(`users/${user.uid}/settings`).set({ hsc: hscTarget, buet: buetTarget });
                setShowSettings(false);
            };

            const handleChoice = (status, dateId = null) => {
                if (!user) return;
                const id = dateId || new Date().toISOString().split('T')[0];
                database.ref(`users/${user.uid}/history/${id}`).set({
                    status,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            };

            const addNote = () => {
                if (!user || !newNote.trim()) return;
                database.ref(`users/${user.uid}/notes`).push().set({
                    text: newNote.trim(),
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                setNewNote("");
            };

            const progressValue = useMemo(() => {
                const yesCount = history.filter(h => h.status === 'yes').length;
                const noCount = history.filter(h => h.status === 'no').length;
                const net = yesCount - noCount;
                return Math.max(-95, Math.min(95, net * 3.33));
            }, [history]);

            const streak = useMemo(() => {
                let s = 0;
                for (let item of history) { if (item.status === 'yes') s++; else break; }
                return s;
            }, [history]);

            const todayStatus = history.find(h => h.id === new Date().toISOString().split('T')[0])?.status;
            const yesTotal = history.filter(h => h.status === 'yes').length;
            const noTotal = history.filter(h => h.status === 'no').length;

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950">
                    <div className="text-center space-y-4">
                        <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p className="text-blue-500 font-bold tracking-widest animate-pulse">লোড হচ্ছে...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950 px-4">
                    <div className="glass p-10 rounded-[2.5rem] text-center space-y-8 w-full max-w-sm">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter">BUET<span className="text-blue-500">TRACKER</span></h1>
                        <p className="text-slate-400 text-sm">ডেটা সিঙ্ক করতে গুগল দিয়ে সাইন-ইন করুন।</p>
                        <button onClick={handleGoogleLogin} className="w-full py-4 bg-white text-black rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-200 transition-all">

                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 px-4 pt-6 md:pt-10 max-w-2xl mx-auto relative">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden z-[9999]">
                        {notes.map((n, i) => <FloatingNote key={n.id} text={n.text} index={i} />)}
                    </div>

                    <div className="sticky top-4 z-[50] mb-8">
                        <div className="glass rounded-2xl p-4 shadow-2xl border-white/20">
                            <div className="flex justify-between text-[10px] font-black italic mb-2 tracking-widest">
                                <span className={progressValue < 0 ? "text-red-500" : "text-slate-500"}>LOSER</span>
                                <span className={progressValue > 0 ? "text-blue-400" : "text-slate-500"}>BUETIAN</span>
                            </div>

                                </div>

                                </div>
                            </div>
                        </div>
                    </div>

                    <header className="text-center mb-8 space-y-4">
